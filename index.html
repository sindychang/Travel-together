<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="旅遊行程">
  <meta name="theme-color" content="#5b52e8">
  <link rel="manifest" href="manifest.json">
  <title>旅遊行程規劃</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <style>
  :root{
    --primary:#5b52e8;--primary-light:#ede9fe;--primary-dark:#4338ca;
    --accent:#7c3aed;--accent2:#ec4899;
    --success:#10b981;--warning:#d97706;--danger:#dc2626;--danger-light:#fee2e2;
    --surface:#fff;--bg:#f4f6fb;
    --border:#e8edf5;--border-light:#f1f5f9;
    --text-primary:#1e293b;--text-secondary:#475569;--text-muted:#94a3b8;
    --shadow-sm:0 1px 4px rgba(0,0,0,.07);--shadow-md:0 4px 16px rgba(0,0,0,.08);--shadow-lg:0 8px 32px rgba(0,0,0,.14);
    --radius-sm:8px;--radius-md:14px;--radius-lg:20px;
  }
  *{font-family:'Noto Sans TC',sans-serif;-webkit-tap-highlight-color:transparent;box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:var(--bg);padding-bottom:calc(env(safe-area-inset-bottom,0px) + 78px);min-height:100vh;color:var(--text-primary);font-size:14px}
  .page{display:none;max-width:680px;margin:0 auto}
  .page.active{display:block;animation:fade .25s}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .hidden{display:none!important}
  button{font-family:'Noto Sans TC',sans-serif;cursor:pointer}
  input,select,textarea{font-family:'Noto Sans TC',sans-serif;font-size:14px}

  /* ── HEADER ── */
  .topbar{position:sticky;top:0;z-index:50;background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;padding:calc(env(safe-area-inset-top,0px) + 14px) 16px 14px;box-shadow:var(--shadow-md)}
  .topbar-row{display:flex;align-items:center;justify-content:space-between;gap:10px;max-width:680px;margin:0 auto}
  .topbar-title{font-size:18px;font-weight:900;display:flex;align-items:center;gap:8px;min-width:0}
  .topbar-title .tt-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .topbar-sub{font-size:11px;opacity:.85;margin-top:2px;font-weight:500}
  .me-btn{background:rgba(255,255,255,.2);border:none;color:#fff;padding:7px 13px;border-radius:999px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px;white-space:nowrap}
  .me-btn .me-dot{width:8px;height:8px;border-radius:50%;background:#a7f3d0}

  /* ── NAV ── */
  .nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:8px 4px calc(env(safe-area-inset-bottom,0px) + 8px);z-index:80;box-shadow:0 -2px 16px rgba(0,0,0,.05)}
  .nav-item{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 0;color:#b0bbc8;transition:.15s}
  .nav-item.active{color:var(--primary)}
  .nav-item .ico{font-size:21px;line-height:1}
  .nav-item .lab{font-size:10px;font-weight:700}

  /* ── GENERIC ── */
  .wrap{padding:14px 14px 20px}
  .sec-title{font-size:13px;font-weight:900;color:var(--text-secondary);margin:18px 4px 8px;display:flex;align-items:center;gap:6px}
  .card{background:var(--surface);border-radius:var(--radius-md);border:1px solid var(--border-light);box-shadow:var(--shadow-sm);margin-bottom:10px;overflow:hidden}
  .btn{border:none;border-radius:var(--radius-sm);padding:11px 16px;font-size:14px;font-weight:700;background:var(--primary);color:#fff;transition:.15s;display:inline-flex;align-items:center;justify-content:center;gap:6px}
  .btn:active{transform:scale(.96)}
  .btn.full{width:100%}
  .btn.ghost{background:var(--primary-light);color:var(--primary-dark)}
  .btn.gray{background:var(--border-light);color:var(--text-secondary)}
  .btn.sm{padding:7px 12px;font-size:12px;border-radius:8px}
  .btn.danger{background:var(--danger-light);color:var(--danger)}
  .empty{text-align:center;color:var(--text-muted);padding:40px 20px;font-size:13px;font-weight:500}
  .empty .big{font-size:40px;display:block;margin-bottom:10px}
  .chip{padding:4px 11px;border-radius:999px;font-size:11px;font-weight:700;border:1.5px solid var(--border);background:var(--surface);color:#64748b;white-space:nowrap;transition:.15s}
  .chip.on{background:var(--primary);color:#fff;border-color:var(--primary)}
  .pill{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:700}
  .tag-input{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text-primary);outline:none;transition:.15s}
  .tag-input:focus{border-color:var(--primary);background:#fff}
  label.fld{display:block;font-size:11px;font-weight:700;color:var(--text-muted);margin:10px 2px 5px}
  textarea.tag-input{resize:vertical;min-height:60px}

  /* type colors */
  .t-spot{background:#eef2ff;color:#4338ca}
  .t-food{background:#fff1f2;color:#be123c}
  .t-hotel{background:#ecfeff;color:#0e7490}
  .t-move{background:#f0fdf4;color:#15803d}
  .t-other{background:#f5f3ff;color:#6d28d9}

  /* ── TRIP CARD ── */
  .trip-card{cursor:pointer;position:relative}
  .trip-cover{height:96px;background:linear-gradient(135deg,var(--primary),var(--accent2));display:flex;align-items:flex-end;padding:12px;color:#fff}
  .trip-cover .tc-name{font-size:18px;font-weight:900;text-shadow:0 1px 4px rgba(0,0,0,.3)}
  .trip-meta{padding:10px 13px;display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--text-secondary);font-weight:600}
  .trip-card.active-trip{border:2px solid var(--primary)}

  /* ── ITINERARY ── */
  .day-head{display:flex;align-items:center;justify-content:space-between;background:var(--primary-light);border-radius:var(--radius-sm);padding:9px 13px;margin:14px 0 8px;cursor:pointer}
  .day-head .dh-l{display:flex;align-items:center;gap:9px}
  .day-badge{background:var(--primary);color:#fff;font-weight:900;font-size:13px;padding:3px 10px;border-radius:8px}
  .day-date{font-size:11px;color:var(--text-secondary);font-weight:700}
  .item{display:flex;gap:9px;padding:11px 12px;position:relative}
  .item-handle{flex-shrink:0;width:22px;display:flex;align-items:center;justify-content:center;color:#cbd5e1;font-size:17px;cursor:grab;touch-action:none}
  .item-body{flex:1;min-width:0}
  .item-top{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
  .item-name{font-size:14px;font-weight:700;color:var(--text-primary)}
  .item-time{font-size:11px;font-weight:700;color:var(--primary);background:var(--primary-light);padding:2px 8px;border-radius:6px}
  .item-note{font-size:12px;color:var(--text-secondary);margin-top:5px;white-space:pre-wrap;line-height:1.5}
  .item-acts{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
  .mini-link{font-size:11px;font-weight:700;color:var(--primary);text-decoration:none;display:inline-flex;align-items:center;gap:3px;padding:4px 9px;border-radius:7px;background:var(--primary-light)}
  .transit{display:flex;align-items:center;gap:7px;padding:5px 12px 5px 40px;color:var(--text-muted);font-size:11px;font-weight:700}
  .transit .tline{flex:1;border-top:1.5px dashed var(--border)}
  .item.dragging{opacity:.5}
  .item.dragover{box-shadow:inset 0 2px 0 var(--primary)}
  .map-embed{width:100%;height:200px;border:none;border-radius:var(--radius-sm);margin-top:6px}

  /* ── place library ── */
  .place-row{display:flex;gap:10px;align-items:flex-start;padding:11px 12px}
  .place-thumb{width:42px;height:42px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px}

  /* ── memo ── */
  .memo-item{display:flex;gap:9px;align-items:flex-start;padding:10px 12px;border-bottom:1px solid var(--border-light)}
  .memo-item:last-child{border-bottom:none}
  .cb{width:20px;height:20px;border-radius:6px;border:2px solid #cbd5e1;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:.15s;margin-top:1px;background:#fff}
  .cb.on{background:var(--success);border-color:var(--success)}
  .cb.on::after{content:'';width:4px;height:8px;border:2px solid #fff;border-top:none;border-left:none;transform:rotate(40deg) translateY(-1px)}
  .memo-txt{flex:1;font-size:14px;line-height:1.5;word-break:break-word}
  .memo-txt.done{text-decoration:line-through;color:var(--text-muted)}

  /* ── poll ── */
  .poll-opt{padding:10px 12px;border-bottom:1px solid var(--border-light)}
  .poll-bar-bg{height:8px;background:var(--border-light);border-radius:999px;overflow:hidden;margin-top:6px}
  .poll-bar{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent2));border-radius:999px;transition:width .4s}
  .voters{font-size:10px;color:var(--text-muted);margin-top:4px}

  /* ── weather / fx ── */
  .wx-day{min-width:64px;text-align:center;background:var(--bg);border-radius:12px;padding:10px 6px;flex-shrink:0}
  .wx-emoji{font-size:24px}
  .wx-scroll{display:flex;gap:8px;overflow-x:auto;padding:4px 2px 8px}

  /* ── modal ── */
  .modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:200;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(2px)}
  .modal-bg.show{display:flex}
  .modal{background:#fff;width:100%;max-width:680px;border-radius:22px 22px 0 0;padding:18px 18px calc(env(safe-area-inset-bottom,0px) + 18px);max-height:90vh;overflow-y:auto;animation:slideup .25s}
  @keyframes slideup{from{transform:translateY(100%)}to{transform:none}}
  .modal-grip{width:40px;height:4px;background:var(--border);border-radius:999px;margin:0 auto 14px}
  .modal-title{font-size:17px;font-weight:900;margin-bottom:4px}
  .modal-acts{display:flex;gap:8px;margin-top:18px}
  .seg{display:flex;gap:5px;background:var(--border-light);border-radius:10px;padding:4px;flex-wrap:wrap}
  .seg button{flex:1;min-width:60px;padding:8px 4px;border-radius:7px;border:none;background:none;font-size:12px;font-weight:700;color:var(--text-muted)}
  .seg button.on{background:#fff;color:var(--primary);box-shadow:var(--shadow-sm)}

  /* ── lock / role ── */
  .lock{position:fixed;inset:0;background:linear-gradient(160deg,var(--primary),var(--accent));z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px;color:#fff;text-align:center}
  .lock h1{font-size:26px;margin:0 0 6px;font-weight:900}
  .lock p{opacity:.9;font-size:13px;margin:0 0 26px}
  .role-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;width:100%;max-width:340px}
  .role-btn{background:rgba(255,255,255,.16);border:1.5px solid rgba(255,255,255,.3);color:#fff;padding:16px 10px;border-radius:16px;font-size:15px;font-weight:700;display:flex;flex-direction:column;align-items:center;gap:6px}
  .role-btn .rb-emoji{font-size:26px}
  .role-add{background:rgba(255,255,255,.08);border:1.5px dashed rgba(255,255,255,.5)}

  /* toast */
  .toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);background:var(--text-primary);color:#fff;padding:10px 18px;border-radius:999px;font-size:13px;font-weight:700;z-index:900;opacity:0;transition:.25s;pointer-events:none}
  .toast.show{opacity:1;bottom:104px}
  .fab{position:fixed;right:16px;bottom:calc(env(safe-area-inset-bottom,0px) + 90px);width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;border:none;font-size:26px;box-shadow:var(--shadow-lg);z-index:70;display:flex;align-items:center;justify-content:center}
  .fab:active{transform:scale(.92)}
  .row-between{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .x-btn{background:none;border:none;font-size:20px;color:var(--text-muted);padding:4px}
  .dot-menu-btn{background:none;border:none;color:var(--text-muted);font-size:18px;padding:2px 6px;font-weight:900}

  /* print */
  #print-area{display:none}
  @media print{
    body *{visibility:hidden}
    #print-area,#print-area *{visibility:visible}
    #print-area{display:block;position:absolute;left:0;top:0;width:100%;padding:20px}
    .nav,.topbar,.fab{display:none!important}
  }
  </style>
</head>
<body>

  <!-- 角色選擇 / 鎖定畫面 -->
  <div class="lock" id="lock">
    <div style="font-size:54px;margin-bottom:10px">🧳</div>
    <h1>一起去旅行</h1>
    <p>選擇你是誰，開始共同規劃行程</p>
    <div class="role-grid" id="role-grid"></div>
  </div>

  <!-- 頂部 -->
  <div class="topbar" id="topbar">
    <div class="topbar-row">
      <div class="topbar-title" style="flex-direction:column;align-items:flex-start;gap:0">
        <span class="tt-name" id="tb-title">旅遊行程</span>
        <span class="topbar-sub" id="tb-sub"></span>
      </div>
      <button class="me-btn" id="me-btn" onclick="openMe()"><span class="me-dot"></span><span id="me-name">我</span></button>
    </div>
  </div>

  <!-- 頁面 -->
  <div id="page-trips" class="page active"><div class="wrap" id="trips-wrap"></div></div>
  <div id="page-itin" class="page"><div class="wrap" id="itin-wrap"></div></div>
  <div id="page-places" class="page"><div class="wrap" id="places-wrap"></div></div>
  <div id="page-memo" class="page"><div class="wrap" id="memo-wrap"></div></div>
  <div id="page-tools" class="page"><div class="wrap" id="tools-wrap"></div></div>

  <button class="fab hidden" id="fab" onclick="fabAction()">＋</button>

  <!-- 底部導覽 -->
  <div class="nav" id="nav">
    <button class="nav-item active" data-page="trips" onclick="go('trips')"><span class="ico">🗺️</span><span class="lab">旅程</span></button>
    <button class="nav-item" data-page="itin" onclick="go('itin')"><span class="ico">📅</span><span class="lab">行程</span></button>
    <button class="nav-item" data-page="places" onclick="go('places')"><span class="ico">⭐</span><span class="lab">收藏</span></button>
    <button class="nav-item" data-page="memo" onclick="go('memo')"><span class="ico">📝</span><span class="lab">備忘</span></button>
    <button class="nav-item" data-page="tools" onclick="go('tools')"><span class="ico">🧰</span><span class="lab">工具</span></button>
  </div>

  <div class="modal-bg" id="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal" id="modal"></div></div>
  <div class="toast" id="toast"></div>
  <div id="print-area"></div>

<script>
/* ════════════════ Firebase & 資料層 ════════════════ */
const firebaseConfig = {
  apiKey: "AIzaSyBN8V3wZOp9vaJFkIN9rDWTNELK9UHOB8I",
  authDomain: "my-housework-73a32.firebaseapp.com",
  databaseURL: "https://my-housework-73a32-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "my-housework-73a32",
  storageBucket: "my-housework-73a32.firebasestorage.app",
  messagingSenderId: "792978110342",
  appId: "1:792978110342:web:8dde74d7ca02af00561e07"
};
let db=null;
try{ firebase.initializeApp(firebaseConfig); db=firebase.database(); }catch(e){ console.error('FB init',e); }
const ROOT='rooms/travelapp_v1';       // 用 rooms 命名空間以符合資料庫安全規則；與家務 app 的 token 不同，互不影響
let DATA={};                            // 完整資料快照
let ME=localStorage.getItem('tv_me')||''; // 目前角色
let ACTIVE=localStorage.getItem('tv_trip')||''; // 目前旅程
let CURPAGE=localStorage.getItem('tv_page')||'trips';
const DEFAULT_ROLES=[['我','😎'],['夥伴','🧑‍🤝‍🧑'],['家人','👨‍👩‍👧'],['朋友','🐱']];

const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const ref=(p)=>db.ref(ROOT+(p?'/'+p:''));
const esc=(s)=>(s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const $=(id)=>document.getElementById(id);

function toast(msg){ const t=$('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),1800); }

function startSync(){
  renderAll();                          // 先用現有資料立即渲染，不卡在等雲端
  if(!db){ toast('離線模式（無法同步）'); return; }
  ref().on('value',
    snap=>{ DATA=snap.val()||{}; renderAll(); },
    err=>{ console.error('雲端讀取失敗',err); toast('雲端連線失敗，仍可離線使用'); }
  );
}
function fbSet(path,val){ if(db) ref(path).set(val); }
function fbUpdate(path,obj){ if(db) ref(path).update(obj); }
function fbRemove(path){ if(db) ref(path).remove(); }

/* ════════════════ 角色 / 登入 ════════════════ */
function roleList(){
  const r=DATA.roles||{};
  let arr=Object.keys(r).map(k=>[r[k].name,r[k].emoji||'🙂',k]);
  if(arr.length===0) arr=DEFAULT_ROLES.map(x=>[x[0],x[1],null]);
  return arr;
}
function renderRoles(){
  const arr=roleList();
  $('role-grid').innerHTML=arr.map(([n,e])=>
    `<button class="role-btn" onclick="pickRole('${esc(n).replace(/'/g,"\\'")}')"><span class="rb-emoji">${e}</span>${esc(n)}</button>`
  ).join('')+`<button class="role-btn role-add" onclick="addRole()"><span class="rb-emoji">＋</span>新增成員</button>`;
}
function ensureDefaultRoles(){
  if(!DATA.roles||Object.keys(DATA.roles).length===0){
    const o={}; DEFAULT_ROLES.forEach(([n,e])=>{const k=uid();o[k]={name:n,emoji:e};}); fbSet('roles',o);
  }
}
function addRole(){
  const n=prompt('成員名稱？'); if(!n||!n.trim())return;
  const emojis=['🐰','🐻','🦊','🐼','🐧','🦄','🐯','🐨','🌟','🍡']; const e=emojis[Math.floor(Math.random()*emojis.length)];
  const k=uid(); fbSet('roles/'+k,{name:n.trim(),emoji:e});
  setTimeout(()=>pickRole(n.trim()),300);
}
function pickRole(name){ ME=name; localStorage.setItem('tv_me',name); $('lock').style.display='none'; renderAll(); }
function openMe(){
  const arr=roleList();
  modal(`<div class="modal-title">切換成員</div><p style="color:var(--text-muted);font-size:12px;margin:2px 0 14px">目前：${esc(ME)}</p>
  <div class="role-grid" style="grid-template-columns:repeat(2,1fr)">${arr.map(([n,e])=>`<button class="role-btn" style="background:var(--bg);border-color:var(--border);color:var(--text-primary)" onclick="pickRole('${esc(n).replace(/'/g,"\\'")}');closeModal()"><span class="rb-emoji">${e}</span>${esc(n)}</button>`).join('')}
  <button class="role-btn role-add" style="background:var(--primary-light);border-color:var(--primary);color:var(--primary-dark)" onclick="closeModal();addRole()"><span class="rb-emoji">＋</span>新增</button></div>`);
}

/* ════════════════ 導覽 / Modal ════════════════ */
function go(p){
  CURPAGE=p;
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  $('page-'+p).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.toggle('active',b.dataset.page===p));
  localStorage.setItem('tv_page',p);
  window.scrollTo(0,0); renderAll();
}
function modal(html){ $('modal').innerHTML=`<div class="modal-grip"></div>`+html; $('modal-bg').classList.add('show'); }
function closeModal(){ $('modal-bg').classList.remove('show'); _seg={}; }
const safeKey=(s)=>String(s).replace(/[.#$\[\]\/]/g,'_');

function updateFab(){
  const f=$('fab');
  const show=(CURPAGE==='trips')||(CURPAGE==='itin'&&ACTIVE)||(CURPAGE==='places'&&ACTIVE)||(CURPAGE==='memo'&&ACTIVE);
  f.classList.toggle('hidden',!show);
}
function fabAction(){
  if(CURPAGE==='trips') editTrip();
  else if(CURPAGE==='itin') addItemPrompt();
  else if(CURPAGE==='places') editPlace();
  else if(CURPAGE==='memo') addMemoPrompt();
}

/* ════════════════ 總渲染分派 ════════════════ */
function renderAll(){
  ensureDefaultRoles();
  if(!ME){ renderRoles(); $('lock').style.display='flex'; return; }
  $('lock').style.display='none';

function mapsEmbedUrl(q){ return 'https://maps.google.com/maps?q='+encodeURIComponent(q)+'&z=15&output=embed'; }
function mapsDirUrl(from,to,mode){ const m={walk:'walking',transit:'transit',drive:'driving',bike:'bicycling',taxi:'driving'}[mode]||'transit'; return 'https://www.google.com/maps/dir/?api=1&origin='+encodeURIComponent(from)+'&destination='+encodeURIComponent(to)+'&travelmode='+m; }

/* ── 拖拉排序（pointer） ── */
let _drag=null;
function dragStart(e,dayId,itId){
  e.preventDefault();
  const el=e.target.closest('.item'); const container=el.parentNode;
  _drag={el,container,dayId,itId};
  el.classList.add('dragging'); el.setPointerCapture&&el.setPointerCapture(e.pointerId);
  document.addEventListener('pointermove',dragMove);
  document.addEventListener('pointerup',dragEnd,{once:true});
}
function dragMove(e){
  if(!_drag)return;
  const after=getDragAfter(_drag.container,e.clientY);
  if(after==null) _drag.container.appendChild(_drag.el);
  else _drag.container.insertBefore(_drag.el,after);
}
function getDragAfter(container,y){
  const els=[...container.querySelectorAll('.item:not(.dragging)')];
  return els.reduce((closest,child)=>{
    const box=child.getBoundingClientRect(); const offset=y-box.top-box.height/2;
    if(offset<0&&offset>closest.offset) return {offset,element:child};
    return closest;
  },{offset:-Infinity}).element||null;
}
function dragEnd(){
  if(!_drag)return;
  document.removeEventListener('pointermove',dragMove);
  _drag.el.classList.remove('dragging');
  const ids=[..._drag.container.querySelectorAll('.item')].map(el=>el.dataset.id);
  const upd={}; ids.forEach((id,i)=>{ upd[id+'/order']=i; });
  fbUpdate('items/'+ACTIVE+'/'+_drag.dayId,upd);
  _drag=null;
}

}
function editPlace(id){

    <label class="fld">名稱</label><input class="tag-input" id="pl-name" placeholder="例：一蘭拉麵 新宿店" value="${esc(p.name||'')}">

function savePlace(id){
  const name=$('pl-name').value.trim(); if(!name){toast('請輸入名稱');return;}
  const cat=_seg['pl-cat']||(document.querySelector('#pl-cat button.on')?document.querySelector('#pl-cat button.on').dataset.v:'spot');

function addPlaceToItin(id){

function doAddPlace(pid,dayId){

/* ════════════════ 備忘頁 ════════════════ */
const SECT={need:['大家的需求','💬'],notice:['注意事項','⚠️'],pack:['必帶清單','🎒'],link:['實用連結','🔗']};
function renderMemo(){
  if(!ACTIVE){ $('memo-wrap').innerHTML=`<div class="empty"><span class="big">📝</span>請先到「旅程」選一趟旅程</div>`; return; }
  const all=Object.keys(DATA.memos&&DATA.memos[ACTIVE]||{}).map(k=>Object.assign({_id:k},DATA.memos[ACTIVE][k]));
  let h=`<div class="sec-title" style="margin:6px 4px">📝 備忘錄</div>`;
  Object.keys(SECT).forEach(sec=>{
    const items=all.filter(m=>m.section===sec).sort((a,b)=>(a.order||0)-(b.order||0));
    h+=`<div class="row-between" style="margin:16px 4px 6px"><div style="font-weight:900;font-size:13px;color:var(--text-secondary)">${SECT[sec][1]} ${SECT[sec][0]}</div>
      <button class="btn sm gray" onclick="addMemoPrompt('${sec}')">＋</button></div>`;
    if(items.length===0){ h+=`<div style="color:var(--text-muted);font-size:12px;padding:4px 6px 8px">尚無項目</div>`; }
    else { h+=`<div class="card">`; items.forEach(m=>{
      const checkable=(sec==='pack');
      h+=`<div class="memo-item">
        ${checkable?`<div class="cb ${m.done?'on':''}" onclick="fbUpdate('memos/${ACTIVE}/${m._id}',{done:${m.done?'false':'true'}})"></div>`:`<div style="width:6px;height:6px;border-radius:50%;background:var(--primary);margin-top:8px;flex-shrink:0"></div>`}
        <div class="memo-txt ${m.done?'done':''}" onclick="editMemo('${m._id}')">${sec==='link'&&m.url?`<a href="${esc(m.url)}" target="_blank" style="color:var(--primary);font-weight:700" onclick="event.stopPropagation()">${esc(m.text||m.url)}</a>`:esc(m.text)}${m.by?`<span style="font-size:10px;color:var(--text-muted);margin-left:6px">– ${esc(m.by)}</span>`:''}</div>
        <button class="x-btn" onclick="fbRemove('memos/${ACTIVE}/${m._id}')">✕</button>
      </div>`;
    }); h+=`</div>`; }
  });
  $('memo-wrap').innerHTML=h;
}
function addMemoPrompt(sec){ editMemo(null,sec||'need'); }
function editMemo(id,sec){
  const m=(id&&DATA.memos&&DATA.memos[ACTIVE]&&DATA.memos[ACTIVE][id])||{};
  sec=m.section||sec||'need';
  modal(`<div class="modal-title">${id?'編輯':'新增'}備忘</div>
    <label class="fld">分類</label>
    <div class="seg" id="m-sec">${Object.keys(SECT).map(k=>`<button data-v="${k}" class="${sec===k?'on':''}" onclick="segPick('m-sec','${k}')">${SECT[k][1]}${SECT[k][0]}</button>`).join('')}</div>
    <label class="fld">內容</label><textarea class="tag-input" id="m-text" placeholder="例：護照、行動電源、藥品…">${esc(m.text||'')}</textarea>
    <label class="fld">連結（選填，實用連結用，例：入境卡網址）</label><input class="tag-input" id="m-url" placeholder="https://" value="${esc(m.url||'')}">
    <div class="modal-acts">${id?`<button class="btn danger" onclick="fbRemove('memos/${ACTIVE}/${id}');closeModal()">刪除</button>`:''}
    <button class="btn" style="flex:1" onclick="saveMemo('${id||''}')">儲存</button></div>`);
}
function saveMemo(id){
  const text=$('m-text').value.trim(); const url=$('m-url').value.trim(); if(!text&&!url){toast('請輸入內容');return;}
  const section=_seg['m-sec']||(document.querySelector('#m-sec button.on')?document.querySelector('#m-sec button.on').dataset.v:'need');
  const obj={section,text:text||url,url,by:ME};
  if(!id){ const cur=Object.keys(DATA.memos&&DATA.memos[ACTIVE]||{}).filter(k=>DATA.memos[ACTIVE][k].section===section).length; obj.order=cur; obj.done=false; obj.createdAt=Date.now(); fbSet('memos/'+ACTIVE+'/'+uid(),obj); }
  else fbUpdate('memos/'+ACTIVE+'/'+id,obj);
  _seg={}; closeModal(); toast('已儲存');
}

/* ════════════════ 工具頁 ════════════════ */
function renderTools(){
  if(!ACTIVE){ $('tools-wrap').innerHTML=`<div class="empty"><span class="big">🧰</span>請先到「旅程」選一趟旅程</div>`; return; }
  const trip=DATA.trips[ACTIVE];
  let h=`<div class="sec-title" style="margin:6px 4px">🧰 旅遊工具</div>`;

  // 投票
  const polls=Object.keys(DATA.polls&&DATA.polls[ACTIVE]||{}).map(k=>Object.assign({_id:k},DATA.polls[ACTIVE][k])).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
  h+=`<div class="row-between" style="margin:14px 4px 6px"><div style="font-weight:900;font-size:13px;color:var(--text-secondary)">🗳️ 群組投票</div><button class="btn sm" onclick="editPoll()">＋ 發起</button></div>`;
  if(polls.length===0) h+=`<div style="color:var(--text-muted);font-size:12px;padding:0 6px 6px">還沒有投票，發起一個讓大家決定吧</div>`;
  h+=polls.map(p=>{
    const opts=Object.keys(p.options||{}).map(k=>Object.assign({_id:k},p.options[k]));
    const total=opts.reduce((s,o)=>s+Object.keys(o.votes||{}).length,0)||1;
    return `<div class="card" style="padding:12px"><div class="row-between"><div style="font-weight:700">${esc(p.title)}</div><button class="x-btn" onclick="confirmDel('刪除此投票？',()=>fbRemove('polls/${ACTIVE}/${p._id}'))">✕</button></div>
      ${opts.map(o=>{const cnt=Object.keys(o.votes||{}).length;const pct=Math.round(cnt/total*100);const mine=o.votes&&o.votes[safeKey(ME)];
        return `<div class="poll-opt" style="cursor:pointer;border:none;padding:8px 0" onclick="votePoll('${p._id}','${o._id}')">
          <div class="row-between"><span style="font-size:13px;font-weight:${mine?'900':'500'};color:${mine?'var(--primary)':'inherit'}">${mine?'✓ ':''}${esc(o.text)}</span><span style="font-size:12px;font-weight:700;color:var(--text-muted)">${cnt}票</span></div>
          <div class="poll-bar-bg"><div class="poll-bar" style="width:${pct}%"></div></div>
          ${cnt?`<div class="voters">${Object.keys(o.votes).join('、')}</div>`:''}</div>`;}).join('')}
      <button class="btn sm ghost full" style="margin-top:8px" onclick="addPollOpt('${p._id}')">＋ 新增選項</button></div>`;
  }).join('');

  // 天氣
  h+=`<div style="font-weight:900;font-size:13px;color:var(--text-secondary);margin:18px 4px 6px">🌤️ 天氣預報</div>
    <div class="card" style="padding:12px"><div style="display:flex;gap:8px"><input class="tag-input" id="wx-q" placeholder="城市（例：Tokyo、Seoul）" value="${esc(trip.dest||'')}"><button class="btn" onclick="getWeather()">查詢</button></div>
    <div id="wx-result" style="margin-top:10px;color:var(--text-muted);font-size:12px">輸入城市後查未來天氣（免費，不需金鑰）</div></div>`;

  // 匯率
  h+=`<div style="font-weight:900;font-size:13px;color:var(--text-secondary);margin:18px 4px 6px">💱 匯率換算</div>
    <div class="card" style="padding:12px">
    <div style="display:flex;gap:8px;align-items:flex-end">
      <div style="flex:1"><label class="fld">金額</label><input type="number" class="tag-input" id="fx-amt" value="1000" oninput="doFx()"></div>
      <div style="width:84px"><label class="fld">從</label><input class="tag-input" id="fx-from" value="${esc(trip.currency||'JPY')}" oninput="doFx()"></div>
      <div style="width:84px"><label class="fld">到</label><input class="tag-input" id="fx-to" value="TWD" oninput="doFx()"></div>
    </div>
    <div id="fx-result" style="margin-top:10px;font-size:15px;font-weight:700;color:var(--primary)">—</div>
    <div style="font-size:10px;color:var(--text-muted);margin-top:2px">即時匯率僅供參考</div></div>`;

  // 匯出
  h+=`<div style="font-weight:900;font-size:13px;color:var(--text-secondary);margin:18px 4px 6px">📄 匯出 / 離線</div>
    <div class="card" style="padding:12px">
    <button class="btn full ghost" onclick="exportPDF()">📄 匯出 / 列印行程（存成 PDF）</button>
    <p style="font-size:11px;color:var(--text-muted);margin:8px 2px 0;line-height:1.6">列印視窗選「另存為 PDF」即可下載完整行程；app 已支援離線開啟，曾載入的資料沒網路也看得到。</p></div>`;

  $('tools-wrap').innerHTML=h;
  doFx();
}

/* ── 投票 ── */
function editPoll(){
  modal(`<div class="modal-title">發起投票</div>
    <label class="fld">主題</label><input class="tag-input" id="pq-title" placeholder="例：第二天晚餐去哪？">
    <label class="fld">選項（每行一個）</label><textarea class="tag-input" id="pq-opts" style="min-height:90px" placeholder="燒肉&#10;壽司&#10;拉麵"></textarea>
    <div class="modal-acts"><button class="btn gray" onclick="closeModal()">取消</button><button class="btn" style="flex:2" onclick="savePoll()">發起</button></div>`);
}
function savePoll(){
  const title=$('pq-title').value.trim(); if(!title){toast('請輸入主題');return;}
  const lines=$('pq-opts').value.split('\n').map(s=>s.trim()).filter(Boolean);
  if(lines.length<2){toast('至少兩個選項');return;}
  const options={}; lines.forEach(t=>{options[uid()]={text:t,votes:{}};});
  fbSet('polls/'+ACTIVE+'/'+uid(),{title,by:ME,createdAt:Date.now(),options});
  closeModal(); toast('已發起');
}
function votePoll(pollId,optId){
  const opts=DATA.polls[ACTIVE][pollId].options; const mk=safeKey(ME);
  const upd={};
  Object.keys(opts).forEach(k=>{ upd['options/'+k+'/votes/'+mk]= (k===optId && !(opts[k].votes&&opts[k].votes[mk]))?true:null; });
  fbUpdate('polls/'+ACTIVE+'/'+pollId,upd);
}
function addPollOpt(pollId){
  const t=prompt('新增選項'); if(!t||!t.trim())return;
  fbSet('polls/'+ACTIVE+'/'+pollId+'/options/'+uid(),{text:t.trim(),votes:{}});
}

/* ── 天氣（Open-Meteo） ── */
const WXCODE={0:['☀️','晴'],1:['🌤️','大致晴'],2:['⛅','多雲'],3:['☁️','陰'],45:['🌫️','霧'],48:['🌫️','霧'],51:['🌦️','毛毛雨'],53:['🌦️','小雨'],55:['🌧️','雨'],61:['🌧️','小雨'],63:['🌧️','雨'],65:['🌧️','大雨'],71:['🌨️','小雪'],73:['🌨️','雪'],75:['❄️','大雪'],80:['🌦️','陣雨'],81:['🌧️','陣雨'],82:['⛈️','強陣雨'],95:['⛈️','雷雨'],96:['⛈️','雷雨'],99:['⛈️','雷雨']};
async function getWeather(){
  const q=$('wx-q').value.trim(); if(!q){toast('請輸入城市');return;}
  const box=$('wx-result'); box.textContent='查詢中…';
  try{
    const g=await fetch('https://geocoding-api.open-meteo.com/v1/search?name='+encodeURIComponent(q)+'&count=1&language=zh').then(r=>r.json());
    if(!g.results||!g.results.length){ box.textContent='找不到這個城市'; return; }
    const{latitude,longitude,name,country}=g.results[0];
    const w=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=auto&forecast_days=14`).then(r=>r.json());
    const d=w.daily; let html=`<div style="font-weight:700;color:var(--text-primary);margin-bottom:6px">${esc(name)}${country?'・'+esc(country):''}</div><div class="wx-scroll">`;
    for(let i=0;i<d.time.length;i++){const c=WXCODE[d.weathercode[i]]||['❓',''];const dt=new Date(d.time[i]+'T00:00');
      html+=`<div class="wx-day"><div style="font-size:11px;font-weight:700;color:var(--text-muted)">${(d.time[i]).slice(5)}</div><div style="font-size:10px;color:var(--text-muted)">週${['日','一','二','三','四','五','六'][dt.getDay()]}</div><div class="wx-emoji">${c[0]}</div><div style="font-size:10px;color:var(--text-muted)">${c[1]}</div><div style="font-size:12px;font-weight:700;margin-top:3px">${Math.round(d.temperature_2m_max[i])}°<span style="color:var(--text-muted)">/${Math.round(d.temperature_2m_min[i])}°</span></div></div>`;}
    html+=`</div>`; box.innerHTML=html;
  }catch(e){ box.textContent='查詢失敗，請檢查網路'; }
}

/* ── 匯率（open.er-api.com） ── */
let _fxRates=null,_fxBase=null;
async function doFx(){
  const amt=parseFloat($('fx-amt')?.value)||0; const from=($('fx-from')?.value||'').trim().toUpperCase(); const to=($('fx-to')?.value||'').trim().toUpperCase();
  const res=$('fx-result'); if(!res)return; if(!from||!to){res.textContent='—';return;}
  try{
    if(_fxBase!==from||!_fxRates){ const j=await fetch('https://open.er-api.com/v6/latest/'+from).then(r=>r.json()); if(j.result!=='success'){res.textContent='查無此幣別';return;} _fxRates=j.rates;_fxBase=from; }
    const rate=_fxRates[to]; if(!rate){res.textContent='查無此幣別';return;}
    res.textContent=`${amt.toLocaleString()} ${from} ≈ ${(amt*rate).toLocaleString(undefined,{maximumFractionDigits:2})} ${to}`;
  }catch(e){ res.textContent='匯率查詢失敗'; }
}

/* ── 匯出 PDF ── */
function exportPDF(){
  const trip=DATA.trips[ACTIVE]; const days=sortedBy(DATA.days&&DATA.days[ACTIVE],'order');
  let h=`<h1 style="font-family:sans-serif">${esc(trip.name)}</h1><div style="color:#555">📍 ${esc(trip.dest||'')} ${trip.startDate?'｜'+esc(trip.startDate)+(trip.endDate?' ~ '+esc(trip.endDate):''):''}</div><hr>`;
  days.forEach((day,di)=>{
    const items=sortedBy(DATA.items&&DATA.items[ACTIVE]&&DATA.items[ACTIVE][day._id],'order');
    h+=`<h2 style="margin:16px 0 6px">${esc(day.label||('第'+(di+1)+'天'))} ${day.date?'<span style=\"font-size:13px;color:#777\">'+esc(day.date)+'</span>':''}</h2>`;
    if(!items.length){ h+=`<div style="color:#999">（無安排）</div>`; }
    items.forEach((it,ii)=>{const ty=TYPES[it.type]||TYPES.other;
      h+=`<div style="margin:6px 0;padding-left:8px;border-left:3px solid #5b52e8">
        <b>${it.time?esc(it.time)+'　':''}${ty[1]} ${esc(it.name)}</b>
        ${it.note?`<div style="font-size:12px;color:#555;white-space:pre-wrap">${esc(it.note)}</div>`:''}</div>`;
      if(ii<items.length-1&&it.transitMin){const md=MODES[it.transitMode]||MODES.transit;h+=`<div style="font-size:11px;color:#999;padding-left:10px">↓ ${md[1]} ${esc(it.transitMin)}分</div>`;}
    });
  });
  // 備忘
  const memos=Object.keys(DATA.memos&&DATA.memos[ACTIVE]||{}).map(k=>DATA.memos[ACTIVE][k]);
  if(memos.length){ h+=`<hr><h2>📝 備忘</h2>`; Object.keys(SECT).forEach(sec=>{const ms=memos.filter(m=>m.section===sec);if(ms.length){h+=`<b>${SECT[sec][1]} ${SECT[sec][0]}</b><ul style="margin:4px 0">`+ms.map(m=>`<li>${esc(m.text)}${m.url?' ('+esc(m.url)+')':''}</li>`).join('')+`</ul>`;}}); }
  $('print-area').innerHTML=h;
  setTimeout(()=>{ window.print(); },200);
}
