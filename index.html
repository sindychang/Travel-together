<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <link rel="apple-touch-icon" href="chiikawa_travel.png">
  <link rel="icon" type="image/png" href="chiikawa_travel.png">
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="旅遊行程">
  <meta name="theme-color" content="#2e6b7a">
  <title>旅遊行程規劃</title>
  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <!-- Feather Icons -->
  <script src="https://cdn.jsdelivr.net/npm/feather-icons@4.29.0/dist/feather.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
  :root{
    --primary:#2e6b7a;--primary-light:#c6e4ed;--primary-dark:#1d5060;
    --accent:#2d9080;--accent2:#47b4a8;
    --warm:#7c5cbf;--warm-light:#ede9f8;--warm-dark:#5b3fa8;
    --success:#10b981;--warning:#d97706;--danger:#dc2626;--danger-light:#fee2e2;
    --surface:#f5fbfc;--bg:#edf6f7;
    --border:#b8d4da;--border-light:#dceef3;
    --text-primary:#1e293b;--text-secondary:#475569;--text-muted:#94a3b8;
    --shadow-sm:0 1px 4px rgba(0,0,0,.07);--shadow-md:0 4px 16px rgba(0,0,0,.08);--shadow-lg:0 8px 32px rgba(0,0,0,.14);
    --radius-sm:8px;--radius-md:14px;--radius-lg:20px;
  }
  *{font-family:'Noto Sans TC',sans-serif;-webkit-tap-highlight-color:transparent;box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:var(--bg);padding-bottom:calc(env(safe-area-inset-bottom,0px) + 78px);min-height:100vh;color:var(--text-primary);font-size:14px}
  .page{display:none;max-width:680px;margin:0 auto}
  .page.active{display:block;animation:fade .25s}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .hidden{display:none!important}
  button{font-family:'Noto Sans TC',sans-serif;cursor:pointer}
  input,select,textarea{font-family:'Noto Sans TC',sans-serif;font-size:14px}

  /* feather */
  .fi{display:inline-block;vertical-align:-3px;flex-shrink:0}

  /* ── HEADER ── */
  .topbar{position:sticky;top:0;z-index:50;background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;padding:calc(env(safe-area-inset-top,0px) + 14px) 16px 14px;box-shadow:var(--shadow-md)}
  .topbar-row{display:flex;align-items:center;justify-content:space-between;gap:10px;max-width:680px;margin:0 auto}
  .topbar-title{font-size:18px;font-weight:900;display:flex;align-items:center;gap:8px;min-width:0}
  .topbar-title .tt-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .topbar-sub{font-size:11px;opacity:.85;margin-top:1px;font-weight:500}
  .sync-badge{font-size:10px;opacity:.7;white-space:nowrap;text-align:right}
  .me-btn{background:rgba(255,255,255,.2);border:none;color:#fff;padding:7px 13px;border-radius:999px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px;white-space:nowrap}
  .me-btn .me-dot{width:8px;height:8px;border-radius:50%;background:#a7f3d0}

  /* ── NAV ── */
  .nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:8px 4px calc(env(safe-area-inset-bottom,0px) + 8px);z-index:80;box-shadow:0 -2px 16px rgba(0,0,0,.05)}
  .nav-item{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 0;color:#b0bbc8;transition:.15s}
  .nav-item.active{color:var(--primary)}
  .nav-item .ico{width:22px;height:22px;display:flex;align-items:center;justify-content:center}
  .nav-item .lab{font-size:10px;font-weight:700}

  /* ── GENERIC ── */
  .wrap{padding:14px 14px 20px}
  .sec-title{font-size:13px;font-weight:900;color:var(--text-secondary);margin:18px 4px 8px;display:flex;align-items:center;gap:6px}
  .card{background:var(--surface);border-radius:var(--radius-md);border:1px solid var(--border-light);box-shadow:var(--shadow-sm);margin-bottom:10px;overflow:hidden}
  .btn{border:none;border-radius:var(--radius-sm);padding:11px 16px;font-size:14px;font-weight:700;background:var(--primary);color:#fff;transition:.15s;display:inline-flex;align-items:center;justify-content:center;gap:6px}
  .btn:active{transform:scale(.96)}
  .btn.full{width:100%}
  .btn.ghost{background:var(--primary-light);color:var(--primary-dark)}
  .btn.gray{background:var(--border-light);color:var(--text-secondary)}
  .btn.sm{padding:7px 12px;font-size:12px;border-radius:8px}
  .btn.danger{background:var(--danger-light);color:var(--danger)}
  .empty{text-align:center;color:var(--text-muted);padding:40px 20px;font-size:13px;font-weight:500}
  .empty .big{font-size:40px;display:block;margin-bottom:10px}
  .chip{padding:4px 11px;border-radius:999px;font-size:11px;font-weight:700;border:1.5px solid var(--border);background:var(--surface);color:#64748b;white-space:nowrap;transition:.15s;display:inline-flex;align-items:center;gap:4px}
  .chip.on{background:var(--primary);color:#fff;border-color:var(--primary)}
  .pill{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:700}
  .tag-input{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text-primary);outline:none;transition:.15s;min-width:0;box-sizing:border-box}
  .tag-input:focus{border-color:var(--primary);background:#fff}
  input[type="date"].tag-input,input[type="time"].tag-input,input[type="number"].tag-input{-webkit-appearance:none;appearance:none}
  label.fld{display:block;font-size:11px;font-weight:700;color:var(--text-muted);margin:10px 2px 5px}
  textarea.tag-input{resize:vertical;min-height:60px}
  .edit-info{font-size:10px;color:var(--text-muted);margin-top:4px}

  /* type colors */
  .t-spot{background:#eef2ff;color:#4338ca}
  .t-food{background:#fff1f2;color:#be123c}
  .t-hotel{background:#ecfeff;color:#0e7490}
  .t-shop{background:#fff7ed;color:#c2410c}
  .t-fun{background:var(--warm-light);color:var(--warm)}
  .t-other{background:#f5f3ff;color:#6d28d9}

  /* ── TRIP CARD ── */
  .trip-card{cursor:pointer;position:relative}
  .trip-cover{height:96px;background:linear-gradient(135deg,var(--primary),var(--accent2));display:flex;align-items:flex-end;padding:12px;color:#fff}
  .trip-cover.alt{background:linear-gradient(135deg,var(--warm-dark),var(--warm))}
  .trip-cover .tc-name{font-size:18px;font-weight:900;text-shadow:0 1px 4px rgba(0,0,0,.3)}
  .trip-meta{padding:10px 13px;display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--text-secondary);font-weight:600}
  .trip-card.active-trip{border:2px solid var(--primary)}

  /* ── ITINERARY ── */
  .day-head{display:flex;align-items:center;justify-content:space-between;border-radius:var(--radius-sm);padding:9px 13px;margin:14px 0 8px;cursor:pointer}
  .day-head .dh-l{display:flex;align-items:center;gap:9px}
  .day-head-a{background:#c6e4ed}
  .day-head-a .day-badge{background:#3d8fa3}
  .day-head-b{background:var(--warm-light)}
  .day-head-b .day-badge{background:var(--warm)}
  .day-badge{color:#fff;font-weight:900;font-size:13px;padding:3px 10px;border-radius:8px}
  .day-date{font-size:11px;color:var(--text-secondary);font-weight:700}
  .item{display:flex;gap:9px;padding:11px 12px;position:relative}
  .item-handle{flex-shrink:0;width:22px;display:flex;align-items:center;justify-content:center;color:#cbd5e1;cursor:grab;touch-action:none}
  .item-body{flex:1;min-width:0}
  .item-top{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
  .item-name{font-size:15px;font-weight:900;color:var(--text-primary);margin-top:4px;line-height:1.3}
  .item-time{font-size:11px;font-weight:700;color:var(--primary);background:var(--primary-light);padding:2px 8px;border-radius:6px;display:inline-flex;align-items:center;gap:3px}
  .item-note{font-size:12px;color:var(--text-secondary);margin-top:5px;white-space:pre-wrap;line-height:1.5}
  .item-acts{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
  .item-side{display:flex;flex-direction:row;gap:4px;align-items:flex-start;flex-shrink:0;padding-top:4px}
  .mini-link{font-size:11px;font-weight:700;color:var(--primary);text-decoration:none;display:inline-flex;align-items:center;gap:3px;padding:4px 9px;border-radius:7px;background:var(--primary-light)}
  .transit{display:flex;align-items:center;gap:7px;padding:5px 12px 5px 40px;color:var(--text-muted);font-size:11px;font-weight:700}
  .transit .tline{flex:1;border-top:1.5px dashed var(--border)}
  .item.dragging{opacity:.5}
  .item.dragover{box-shadow:inset 0 2px 0 var(--primary)}
  .day-items.drag-target{outline:2px dashed var(--primary);border-radius:8px;background:var(--warm-light)}
  .map-embed{width:100%;height:200px;border:none;border-radius:var(--radius-sm);margin-top:6px}

  /* ── flights ── */
  .flight-card{display:flex;align-items:center;gap:10px;padding:11px 13px;border-bottom:1px solid var(--border-light)}
  .flight-card:last-child{border-bottom:none}
  .flight-icon{width:36px;height:36px;background:#f0f9ff;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
  .flight-body{flex:1;min-width:0}
  .flight-no{font-weight:900;font-size:13px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .flight-time{font-size:12px;color:var(--text-secondary);margin-top:2px}
  .flight-members{font-size:11px;color:var(--text-muted);margin-top:2px}
  .dir-tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:700}
  .dir-out{background:#dbeafe;color:#1d4ed8}
  .dir-back{background:var(--warm-light);color:var(--warm-dark)}

  /* ── place library ── */
  .place-row{display:flex;gap:10px;align-items:flex-start;padding:11px 12px}
  .place-thumb{width:42px;height:42px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center}

  /* ── tabs ── */
  .tabs{display:flex;background:var(--border-light);border-radius:10px;padding:3px;margin-bottom:14px}
  .tab-btn{flex:1;padding:8px 4px;border:none;border-radius:8px;background:none;font-weight:700;font-size:13px;color:var(--text-muted)}
  .tab-btn.on{background:#fff;color:var(--primary);box-shadow:var(--shadow-sm)}

  /* ── todo ── */
  .todo-item{display:flex;gap:10px;align-items:flex-start;padding:11px 13px;border-bottom:1px solid var(--border-light)}
  .todo-item:last-child{border-bottom:none}
  .todo-cb{width:20px;height:20px;border-radius:6px;border:2px solid #cbd5e1;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:.15s;margin-top:1px;background:#fff;cursor:pointer}
  .todo-cb.on{background:var(--success);border-color:var(--success)}
  .todo-cb.on::after{content:'';width:4px;height:8px;border:2px solid #fff;border-top:none;border-left:none;transform:rotate(40deg) translateY(-1px)}
  .todo-title{flex:1;font-size:14px;font-weight:700;line-height:1.4;word-break:break-word}
  .todo-title.done{text-decoration:line-through;color:var(--text-muted)}
  .due-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:999px;background:#fef3c7;color:#92400e;white-space:nowrap}
  .due-badge.over{background:var(--danger-light);color:var(--danger)}

  /* ── memo ── */
  .memo-item{display:flex;gap:9px;align-items:flex-start;padding:10px 12px;border-bottom:1px solid var(--border-light)}
  .memo-item:last-child{border-bottom:none}
  .cb{width:20px;height:20px;border-radius:6px;border:2px solid #cbd5e1;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:.15s;margin-top:1px;background:#fff;cursor:pointer}
  .cb.on{background:var(--success);border-color:var(--success)}
  .cb.on::after{content:'';width:4px;height:8px;border:2px solid #fff;border-top:none;border-left:none;transform:rotate(40deg) translateY(-1px)}
  .memo-txt{flex:1;font-size:14px;line-height:1.5;word-break:break-word}
  .memo-txt.done{text-decoration:line-through;color:var(--text-muted)}

  /* ── poll ── */
  .poll-opt{padding:10px 12px;border-bottom:1px solid var(--border-light)}
  .poll-bar-bg{height:8px;background:var(--border-light);border-radius:999px;overflow:hidden;margin-top:6px}
  .poll-bar{height:100%;background:linear-gradient(90deg,var(--primary),var(--warm));border-radius:999px;transition:width .4s}
  .voters{font-size:10px;color:var(--text-muted);margin-top:6px;display:flex;flex-wrap:wrap;gap:4px}
  .voter-tag{background:var(--border-light);border-radius:999px;padding:2px 8px;font-size:10px;color:var(--text-muted)}

  /* ── weather / fx ── */
  .wx-day{min-width:64px;text-align:center;background:var(--bg);border-radius:12px;padding:10px 6px;flex-shrink:0}
  .wx-emoji{font-size:24px}
  .wx-scroll{display:flex;gap:8px;overflow-x:auto;padding:4px 2px 8px}

  /* ── modal ── */
  .modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:200;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(2px)}
  .modal-bg.show{display:flex}
  .modal{background:#fff;width:100%;max-width:680px;border-radius:22px 22px 0 0;padding:18px 18px calc(env(safe-area-inset-bottom,0px) + 18px);max-height:90vh;overflow-y:auto;animation:slideup .25s;position:relative;box-sizing:border-box}
  @keyframes slideup{from{transform:translateY(100%)}to{transform:none}}
  .modal-grip{width:40px;height:4px;background:var(--border);border-radius:999px;margin:0 auto 14px}
  .modal-x{position:absolute;top:16px;right:16px;background:none;border:none;padding:4px;color:var(--text-muted);cursor:pointer;display:flex;align-items:center;border-radius:6px;transition:.15s}
  .modal-x:hover{background:var(--border-light);color:var(--text-primary)}
  .modal-title{font-size:17px;font-weight:900;margin-bottom:4px;padding-right:32px}
  .modal-acts{display:flex;gap:8px;margin-top:18px}
  .seg{display:flex;gap:5px;background:var(--border-light);border-radius:10px;padding:4px;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .seg::-webkit-scrollbar{display:none}
  .seg button{flex:1;min-width:56px;white-space:nowrap;padding:8px 6px;border-radius:7px;border:none;background:none;font-size:12px;font-weight:700;color:var(--text-muted);display:flex;align-items:center;justify-content:center;gap:4px;flex-shrink:0}
  .seg button.on{background:#fff;color:var(--primary);box-shadow:var(--shadow-sm)}

  /* ── lock / role ── */
  .lock{position:fixed;inset:0;background:linear-gradient(160deg,var(--primary),var(--accent));z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px;color:#fff;text-align:center}
  .lock h1{font-size:26px;margin:0 0 6px;font-weight:900}
  .lock p{opacity:.9;font-size:13px;margin:0 0 26px}
  .role-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;width:100%;max-width:340px}
  .role-btn{background:rgba(255,255,255,.16);border:1.5px solid rgba(255,255,255,.3);color:#fff;padding:16px 10px;border-radius:16px;font-size:15px;font-weight:700;display:flex;flex-direction:column;align-items:center;gap:6px}
  .role-btn .rb-emoji{font-size:26px}
  .role-add{background:rgba(255,255,255,.08);border:1.5px dashed rgba(255,255,255,.5)}

  /* toast */
  .toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);background:var(--text-primary);color:#fff;padding:10px 18px;border-radius:999px;font-size:13px;font-weight:700;z-index:900;opacity:0;transition:.25s;pointer-events:none;white-space:nowrap}
  .toast.show{opacity:1;bottom:104px}
  .fab{position:fixed;right:16px;bottom:calc(env(safe-area-inset-bottom,0px) + 90px);width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;border:none;font-size:26px;box-shadow:var(--shadow-lg);z-index:70;display:flex;align-items:center;justify-content:center}
  .fab:active{transform:scale(.92)}
  .row-between{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .x-btn{background:none;border:none;font-size:20px;color:var(--text-muted);padding:4px;display:flex;align-items:center;cursor:pointer}
  .dot-menu-btn{background:none;border:none;color:var(--text-muted);padding:2px 6px;font-weight:900;display:flex;align-items:center}

  /* ── centered dialog ── */
  .cdialog-bg{position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:400;display:none;align-items:center;justify-content:center;padding:20px}
  .cdialog-bg.show{display:flex}
  .cdialog{background:var(--surface);border-radius:18px;padding:22px 18px;width:100%;max-width:340px;animation:fade .18s;box-shadow:var(--shadow-lg)}
  .cdialog-title{font-size:15px;font-weight:900;margin-bottom:14px;color:var(--text-primary);line-height:1.4}

  /* print */
  #print-area{display:none}
  @media print{
    body *{visibility:hidden}
    #print-area,#print-area *{visibility:visible}
    #print-area{display:block;position:absolute;left:0;top:0;width:100%;padding:20px}
    .nav,.topbar,.fab{display:none!important}
  }

  /* ── calendar range picker ── */
  .cal-wrap{background:var(--surface);border-radius:var(--radius-md);border:1.5px solid var(--border);overflow:hidden;margin:4px 0}
  .cal-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff}
  .cal-nav-btn{background:none;border:none;color:#fff;font-size:18px;cursor:pointer;padding:2px 10px;border-radius:6px;line-height:1}
  .cal-nav-btn:hover{background:rgba(255,255,255,.2)}
  .cal-month-lbl{font-weight:900;font-size:14px}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;padding:6px 8px 10px}
  .cal-dow{text-align:center;font-size:10px;font-weight:700;color:var(--text-muted);padding:5px 0}
  .cal-day{text-align:center;font-size:13px;padding:7px 2px;cursor:pointer;border-radius:6px;transition:.1s;position:relative;min-height:32px;display:flex;align-items:center;justify-content:center}
  .cal-day:not(.cal-empty):hover{background:var(--primary-light)}
  .cal-day.cal-start{background:var(--primary)!important;color:#fff!important;font-weight:900;border-radius:6px 0 0 6px!important}
  .cal-day.cal-end{background:var(--primary)!important;color:#fff!important;font-weight:900;border-radius:0 6px 6px 0!important}
  .cal-day.cal-start.cal-end{border-radius:6px!important}
  .cal-day.cal-in-range{background:var(--primary-light);border-radius:0;color:var(--primary-dark)}
  .cal-day.cal-today{color:var(--primary);font-weight:900}
  .cal-day.cal-start.cal-today,.cal-day.cal-end.cal-today{color:#fff}
  .cal-today-dot{width:4px;height:4px;border-radius:50%;background:var(--primary);position:absolute;bottom:2px;left:50%;transform:translateX(-50%)}
  .cal-day.cal-start .cal-today-dot,.cal-day.cal-end .cal-today-dot{background:#fff}
  .cal-empty{cursor:default!important;background:none!important}
  .cal-sel-info{display:flex;gap:8px;padding:8px 8px 4px;align-items:center}
  .cal-sel-box{flex:1;padding:8px 10px;border-radius:var(--radius-sm);background:var(--bg);border:1.5px solid var(--border);font-size:12px;font-weight:700;text-align:center;color:var(--text-muted);transition:.12s}
  .cal-sel-box.cal-active{border-color:var(--primary);color:var(--primary);background:var(--primary-light)}
  /* ── emoji picker ── */
  .emoji-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin:8px 0 4px}
  .emoji-btn{font-size:26px;padding:8px 4px;border:2px solid transparent;border-radius:10px;background:var(--bg);cursor:pointer;transition:.12s;line-height:1;text-align:center}
  .emoji-btn:hover{background:var(--primary-light);transform:scale(1.08)}
  .emoji-btn.on{background:var(--primary-light);border-color:var(--primary)}
  /* ── standardized due-tag ── */

<script>
/* ════════════ Firebase + localStorage 混合資料層 ════════════ */
const firebaseConfig = {

let DATA={};

function setMeForTrip(tripId,name){ _myRoles[tripId]=name; localStorage.setItem('tv_my_roles',JSON.stringify(_myRoles)); if(tripId===ACTIVE) ME=name; }

const esc=(s)=>(s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function toast(msg){ const t=$('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),1900); }

/* Feather icon helper */
function fi(name,sz=16){
  try{ return window.feather.icons[name].toSvg({width:sz,height:sz,'stroke-width':1.8,class:'fi'}); }
  catch(e){ return ''; }
}

/* localStorage CRUD */
function loadData(){ try{ DATA=JSON.parse(localStorage.getItem('tv_data2')||'{}'); }catch(e){ DATA={}; } }
function saveData(){ try{ localStorage.setItem('tv_data2',JSON.stringify(DATA)); }catch(e){ toast('儲存失敗：空間不足'); } }

function setDeep(obj,pathStr,val){
  const parts=pathStr.split('/'); let cur=obj;
  for(let i=0;i<parts.length-1;i++){
    if(cur[parts[i]]==null||typeof cur[parts[i]]!=='object') cur[parts[i]]={};
    cur=cur[parts[i]];
  }
  const last=parts[parts.length-1];
  if(val===null||val===undefined) delete cur[last]; else cur[last]=val;
}

let _rt=null;
function scheduleRender(){ clearTimeout(_rt); _rt=setTimeout(renderAll,0); }

function fbSet(path,val){
  setDeep(DATA,path,val); saveData(); scheduleRender();
  if(db) ref(path).set(val).catch(()=>{});
}
function fbUpdate(path,updates){
  const parts=path.split('/'); let nav=DATA;
  for(const p of parts){ if(nav[p]==null||typeof nav[p]!=='object') nav[p]={}; nav=nav[p]; }
  Object.keys(updates).forEach(k=>setDeep(nav,k,updates[k]));
  saveData(); scheduleRender();
  if(db) ref(path).update(updates).catch(()=>{});
}
function fbRemove(path){ setDeep(DATA,path,null); saveData(); scheduleRender(); if(db) ref(path).remove().catch(()=>{}); }

/* ── Firebase 同步（含初始上傳 + 衝突解決） ── */
let _fbListening=false, _conflictLocal=null, _conflictFb=null, _conflictDone=null, _badgeTimer=null;

function getLatestTs(data){
  let max=0;
  function walk(o){ if(!o||typeof o!=='object') return; Object.values(o).forEach(v=>{ if(typeof v==='number'&&v>1_000_000_000_000&&v>max) max=v; else walk(v); }); }
  walk(data); return max||null;
}
function getLatestEditor(data){
  let maxTs=0,editor='';
  function walk(o){ if(!o||typeof o!=='object') return; if(o.updatedBy&&o.updatedAt&&o.updatedAt>maxTs){maxTs=o.updatedAt;editor=o.updatedBy;} Object.values(o).forEach(v=>{if(typeof v==='object')walk(v);}); }
  walk(data); return editor||'不明';
}

/* ── 修改紀錄 ── */
function logChange(action,detail){
  if(!ACTIVE||!db||!ME) return;
  ref('changelog/'+ACTIVE+'/'+uid()).set({who:ME,when:Date.now(),action,detail:detail||''}).catch(()=>{});
}

/* ── 自動版本快照（每次儲存前建立，最多保留5份）── */
function autoSnapshot(action){
  if(!ACTIVE||!db) return;
  const snapData={};
  ['trips','days','items','places','memos','todos','polls','flights'].forEach(k=>{
    if(DATA[k]&&DATA[k][ACTIVE]) snapData[k]={[ACTIVE]:JSON.parse(JSON.stringify(DATA[k][ACTIVE]))};
  });
  const entry={at:Date.now(),who:ME||'匿名',action,data:snapData};
  ref('snapshots/'+ACTIVE+'/'+uid()).set(entry).then(()=>{
    ref('snapshots/'+ACTIVE).orderByChild('at').once('value').then(s=>{
      const keys=[];
      s.forEach(c=>keys.push(c.key));
      if(keys.length>5) keys.slice(0,keys.length-5).forEach(k=>ref('snapshots/'+ACTIVE+'/'+k).remove().catch(()=>{}));
    }).catch(()=>{});
  }).catch(()=>{});
}
function loadSnapshots(){
  const box=$('snapshots-content'); if(!box) return;
  if(!db){box.innerHTML='<div style="color:var(--text-muted);font-size:12px">需連線才能查看</div>';return;}
  ref('snapshots/'+ACTIVE).orderByChild('at').limitToLast(5).once('value').then(s=>{
    const entries=[];
    s.forEach(c=>entries.push({k:c.key,...c.val()}));
    entries.reverse();
    if(!entries.length){box.innerHTML='<div style="color:var(--text-muted);font-size:12px">尚無版本快照<br><span style="font-size:11px">每次儲存時會自動建立</span></div>';return;}
    const fmtTs=ts=>{const d=new Date(ts);return (d.getMonth()+1)+'/'+d.getDate()+' '+(d.getHours()+'').padStart(2,'0')+':'+(d.getMinutes()+'').padStart(2,'0');};
    box.innerHTML=entries.map((e,i)=>`<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border-light)">
      <div style="flex:1;min-width:0">
        <div style="font-size:12px"><span style="font-weight:700;color:var(--primary)">${esc(e.who||'?')}</span>・${esc(e.action||'')}</div>
        <div style="font-size:11px;color:var(--text-muted);margin-top:1px">${fmtTs(e.at)}${i===0?' 〔最新〕':''}</div>
      </div>
      <button class="btn sm ghost" style="flex-shrink:0" onclick="restoreAutoSnapshot('${e.k}')">${fi('rotate-ccw',11)} 還原</button>
    </div>`).join('');
  }).catch(()=>{box.innerHTML='<div style="color:var(--text-muted);font-size:12px">載入失敗</div>';});
}
function restoreAutoSnapshot(snapId){
  if(!db||!ACTIVE){toast('需連線才能還原');return;}
  ref('snapshots/'+ACTIVE+'/'+snapId).once('value').then(s=>{
    const snap=s.val(); if(!snap||!snap.data){toast('快照資料不完整');return;}
    const atStr=new Date(snap.at).toLocaleString('zh-TW',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
    appConfirm(`還原到「${esc(snap.who)}」在 ${atStr} 儲存前的版本？\n目前資料將被覆蓋。`,()=>{
      autoSnapshot('還原操作前的備份');
      ['trips','days','items','places','memos','todos','polls','flights'].forEach(k=>{
        if(snap.data[k]){
          if(!DATA[k])DATA[k]={};
          Object.assign(DATA[k],snap.data[k]);
          if(db) Object.keys(snap.data[k]).forEach(tid=>ref(k+'/'+tid).set(snap.data[k][tid]).catch(()=>{}));
        }
      });
      saveData(); renderAll(); toast('已還原！');
    });
  }).catch(()=>toast('還原失敗，請確認網路連線'));
}

function loadChangelog(){
  const box=$('changelog-content'); if(!box) return;
  if(!db){ box.innerHTML='<div style="color:var(--text-muted);font-size:12px">需連線才能查看紀錄</div>'; return; }
  ref('changelog/'+ACTIVE).orderByChild('when').limitToLast(30).once('value').then(snap=>{
    const entries=[];
    snap.forEach(c=>entries.push(c.val()));
    entries.reverse();
    if(!entries.length){box.innerHTML='<div style="color:var(--text-muted);font-size:12px">尚無修改紀錄</div>';return;}
    const fmtTs=ts=>{const diff=Date.now()-ts;if(diff<60000)return '剛剛';if(diff<3600000)return Math.floor(diff/60000)+'分鐘前';if(diff<86400000)return Math.floor(diff/3600000)+'小時前';const d=new Date(ts);return (d.getMonth()+1)+'/'+d.getDate()+' '+(d.getHours()+'').padStart(2,'0')+':'+(d.getMinutes()+'').padStart(2,'0');};
    box.innerHTML=entries.map(e=>`<div style="display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--border-light)">
      <div style="flex:1;min-width:0"><span style="font-weight:700;color:var(--primary);font-size:12px">${esc(e.who||'?')}</span><span style="font-size:12px;color:var(--text-primary)"> ${esc(e.action||'')}</span>${e.detail?`<div style="font-size:11px;color:var(--text-muted);margin-top:1px">${esc(String(e.detail).slice(0,40))}</div>`:''}</div>
      <div style="font-size:10px;color:var(--text-muted);white-space:nowrap;flex-shrink:0">${fmtTs(e.when)}</div></div>`).join('');
  }).catch(()=>{box.innerHTML='<div style="color:var(--text-muted);font-size:12px">載入失敗</div>';});
}

function startSync(){
  loadData(); renderAll();
  if(!db){ updateSyncBadge(false); return; }
  updateSyncBadge(false);
  // 先做一次性讀取以判斷初始狀態
  ref().once('value').then(snap=>{
    const fbData=snap.val();
    const localHasTrips=DATA&&DATA.trips&&Object.keys(DATA.trips).length>0;
    const fbHasTrips=fbData&&fbData.trips&&Object.keys(fbData.trips).length>0;
    if(fbHasTrips&&localHasTrips){
      // 兩邊都有資料 → 比對是否相同
      if(JSON.stringify(DATA)!==JSON.stringify(fbData)){
        showSyncConflict(DATA,fbData,()=>subscribeFirebase()); return;
      }
    } else if(!fbHasTrips&&localHasTrips){
      // 雲端是空的，本機有資料 → 上傳
      ref().set(DATA).then(()=>toast('本機資料已上傳至雲端 ✓')).catch(()=>toast('上傳雲端失敗，請檢查 Firebase 設定'));
    } else if(fbHasTrips&&!localHasTrips){
      // 本機空，雲端有資料 → 下載
      DATA=fbData; saveData(); renderAll(); toast('已從雲端載入資料');
    }
    subscribeFirebase();
  }).catch(err=>{ console.warn('Firebase init read failed:',err); updateSyncBadge(false); subscribeFirebase(); });
}

function subscribeFirebase(){
  if(_fbListening) return; _fbListening=true;
  ref().on('value', snap=>{
    const d=snap.val();
    if(d){ DATA=d; saveData(); }
    LAST_SYNC=Date.now(); updateSyncBadge(true); renderAll(); handleInviteParam();
  }, ()=>{ _fbListening=false; updateSyncBadge(false); });
}

function showSyncConflict(local,fb,onDone){
  _conflictLocal=local; _conflictFb=fb; _conflictDone=onDone;
  const lTrips=Object.keys(local.trips||{}).length, fTrips=Object.keys(fb.trips||{}).length;
  const lts=getLatestTs(local), fts=getLatestTs(fb);
  const lEditor=getLatestEditor(local), fEditor=getLatestEditor(fb);
  const fmt=ts=>ts?new Date(ts).toLocaleString('zh-TW',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}):'不明';
  const bg=$('cdialog-bg'),bx=$('cdialog');
  bx.innerHTML=`<div class="cdialog-title">${fi('alert-triangle',15)} 發現資料衝突</div>
    <p style="font-size:12px;color:var(--text-muted);margin:0 0 12px;line-height:1.6">本機與雲端資料不同，請選擇要保留哪個版本：</p>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">
      <div style="background:var(--bg);border-radius:10px;padding:12px;text-align:center">
        <div style="font-size:22px;margin-bottom:4px">📱</div>
        <div style="font-size:11px;font-weight:700;color:var(--text-secondary);margin-bottom:4px">本機版本</div>
        ${lEditor!=='不明'?`<div style="font-size:11px;font-weight:700;color:var(--primary);margin-bottom:4px">${esc(lEditor)}</div>`:''}
        <div style="font-size:10px;color:var(--text-muted)">${fmt(lts)}</div>
      </div>
      <div style="background:var(--bg);border-radius:10px;padding:12px;text-align:center">
        <div style="font-size:22px;margin-bottom:4px">☁️</div>
        <div style="font-size:11px;font-weight:700;color:var(--text-secondary);margin-bottom:4px">雲端版本</div>
        ${fEditor!=='不明'?`<div style="font-size:11px;font-weight:700;color:var(--primary);margin-bottom:4px">${esc(fEditor)}</div>`:''}
        <div style="font-size:10px;color:var(--text-muted)">${fmt(fts)}</div>
      </div>
    </div>
    <button class="btn full" style="margin-bottom:8px" onclick="conflictChoose('local')">📱 保留本機版本（覆蓋雲端）</button>
    <button class="btn full ghost" style="margin-bottom:8px" onclick="conflictChoose('cloud')">☁️ 保留雲端版本（覆蓋本機）</button>
    <button class="btn full gray" onclick="conflictChoose('merge')">🔀 合併兩版（保留所有旅程）</button>`;
  bg.classList.add('show');
}
function conflictChoose(choice){
  closeCDialog();
  if(choice==='local'){
    ref().set(_conflictLocal).then(()=>{ DATA=_conflictLocal; saveData(); renderAll(); toast('已保留本機版本並上傳雲端'); if(_conflictDone)_conflictDone(); }).catch(()=>toast('上傳失敗'));
  } else if(choice==='cloud'){
    DATA=_conflictFb; saveData(); renderAll(); toast('已載入雲端版本'); if(_conflictDone)_conflictDone();
  } else {
    // 合併：以 trip ID 為鍵合併所有資料，雲端資料優先
    const m={..._conflictLocal};
    ['trips','days','items','places','todos','memos','polls','flights','roles','sectLabels'].forEach(k=>{
      m[k]={...(_conflictLocal[k]||{}), ...(_conflictFb[k]||{})};
    });
    DATA=m; saveData();
    ref().set(m).then(()=>{ renderAll(); toast('已合併兩版資料'); if(_conflictDone)_conflictDone(); }).catch(()=>{ renderAll(); toast('本機合併完成，雲端同步失敗'); if(_conflictDone)_conflictDone(); });
  }
  _conflictLocal=null; _conflictFb=null; _conflictDone=null;
}

function updateSyncBadge(ok){
  const el=$('tb-sync'); if(!el) return;
  if(ok&&LAST_SYNC){
    const t=new Date(LAST_SYNC);
    const h=t.getHours().toString().padStart(2,'0'), m=t.getMinutes().toString().padStart(2,'0');
    const diffMin=Math.floor((Date.now()-LAST_SYNC)/60000);
    const ago=diffMin<1?'剛才':diffMin<60?diffMin+'分鐘前':Math.floor(diffMin/60)+'小時前';
    el.innerHTML=`<span style="display:inline-flex;align-items:center;gap:4px"><span style="width:6px;height:6px;border-radius:50%;background:#a7f3d0;flex-shrink:0;display:inline-block"></span>雲端同步 ${h}:${m}（${ago}）</span>`;
    if(!_badgeTimer) _badgeTimer=setInterval(()=>{ if(LAST_SYNC) updateSyncBadge(true); },60000);
  } else {
    const color=db?'#fcd34d':'#94a3b8';
    const txt=db?'連線中…':'本機模式';
    el.innerHTML=`<span style="display:inline-flex;align-items:center;gap:4px"><span style="width:6px;height:6px;border-radius:50%;background:${color};flex-shrink:0;display:inline-block"></span>${txt}</span>`;
    if(_badgeTimer){ clearInterval(_badgeTimer); _badgeTimer=null; }
  }
}

function handleInviteParam(){
  const p=new URLSearchParams(location.search); const t=p.get('t'); const code=(p.get('code')||'').toUpperCase();
  if(t && DATA.trips && DATA.trips[t] && t!==ACTIVE){
    const trip=DATA.trips[t];
    if(trip.inviteCode){
      if(code&&code===(trip.inviteCode||'').toUpperCase()){ unlockTrip(t); }
      else if(!canSeeTrip(t)){ return; }
    }
    ACTIVE=t; localStorage.setItem('tv_trip',t); syncMe(); go('itin'); toast('已加入：'+trip.name);
    if(!ME) setTimeout(()=>showRolePicker(t),500);
  }
}

/* ════════════ 邀請碼 / 旅程存取控制 ════════════ */
function getUnlocked(){ try{return JSON.parse(localStorage.getItem('tv_unlocked')||'{}')}catch(e){return{};} }
function unlockTrip(id){ const u=getUnlocked(); u[id]=true; localStorage.setItem('tv_unlocked',JSON.stringify(u)); }
function canSeeTrip(id){ const t=DATA.trips&&DATA.trips[id]; if(!t)return false; if(!t.inviteCode)return true; return !!getUnlocked()[id]; }
function joinByCode(){
  modal(`<div class="modal-title">${fi('key',15)} 以邀請碼加入旅程</div>
    <p style="font-size:13px;color:var(--text-muted);margin:4px 0 14px;line-height:1.6">輸入旅程的邀請碼，即可解鎖並顯示該旅程</p>
    <input class="tag-input" id="join-code" placeholder="邀請碼（英數字）" style="text-transform:uppercase;font-size:18px;font-weight:700;letter-spacing:2px;text-align:center">
    <div class="modal-acts" style="margin-top:14px">
      <button class="btn gray" onclick="closeModal()">取消</button>
      <button class="btn" style="flex:1" onclick="doJoinByCode()">解鎖旅程</button>
    </div>`);
  setTimeout(()=>{ const i=$('join-code'); if(i)i.focus(); },60);
}
function doJoinByCode(){
  const code=($('join-code')?.value||'').trim().toUpperCase();
  if(!code){toast('請輸入邀請碼');return;}
  const found=Object.keys(DATA.trips||{}).find(id=>(DATA.trips[id].inviteCode||'').toUpperCase()===code);
  if(!found){toast('找不到此邀請碼，請確認後再試');return;}
  unlockTrip(found);
  closeModal();
  toast('✓ 已解鎖「'+DATA.trips[found].name+'」');
  scheduleRender();
}
function showInviteCode(id){
  const t=DATA.trips[id]; if(!t||!t.inviteCode)return;

function renderTripCal(){
  const el=$('trip-cal'); if(!el)return;
  const {year,month,start,end}=_cal;
  const months=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const firstDow=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const todayStr=new Date().toISOString().slice(0,10);
  let h=`<div class="cal-head"><button class="cal-nav-btn" onclick="calNavTrip(-1)">◀</button><span class="cal-month-lbl">${year}年${months[month]}</span><button class="cal-nav-btn" onclick="calNavTrip(1)">▶</button></div>`;
  h+=`<div class="cal-grid">`;
  ['日','一','二','三','四','五','六'].forEach(d=>{ h+=`<div class="cal-dow">${d}</div>`; });
  for(let i=0;i<firstDow;i++) h+=`<div class="cal-day cal-empty"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const ds=year+'-'+String(month+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const isS=ds===start,isE=ds===end,inR=start&&end&&ds>start&&ds<end,isT=ds===todayStr;
    let cls='cal-day';
    if(isS)cls+=' cal-start';if(isE)cls+=' cal-end';if(inR)cls+=' cal-in-range';if(isT)cls+=' cal-today';
    h+=`<div class="${cls}" onclick="calPickTrip('${ds}')">${d}${isT?'<span class=\"cal-today-dot\"></span>':''}</div>`;
  }
  h+=`</div>`;
  el.innerHTML=h;
}
function calNavTrip(dir){
  _cal.month+=dir;
  if(_cal.month>11){_cal.month=0;_cal.year++;}
  if(_cal.month<0){_cal.month=11;_cal.year--;}
  renderTripCal();
}
function calPickTrip(ds){
  if(!_cal.start||(_cal.start&&_cal.end)){
    _cal.start=ds; _cal.end='';
  } else {
    if(ds<_cal.start){_cal.end=_cal.start;_cal.start=ds;}
    else if(ds===_cal.start){_cal.start='';}
    else{_cal.end=ds;}
  }
  const ss=$('cal-sel-start'),se=$('cal-sel-end'),hs=$('f-start'),he=$('f-end');
  if(ss){ss.textContent=_cal.start?_cal.start.slice(5).replace('-','/'):'點選出發日';ss.classList.toggle('cal-active',!!_cal.start);}
  if(se){se.textContent=_cal.end?_cal.end.slice(5).replace('-','/'):'點選回程日';se.classList.toggle('cal-active',!!_cal.end);}
  if(hs)hs.value=_cal.start||''; if(he)he.value=_cal.end||'';
  renderTripCal();
}

let _drag=null;
function dragStart(e,dayId,itId){
  e.preventDefault();

  _drag={el,container,origDayId:dayId,itId};
  el.classList.add('dragging');
  el.setPointerCapture&&el.setPointerCapture(e.pointerId);
  document.body.style.userSelect='none'; document.body.style.webkitUserSelect='none';
  document.addEventListener('pointermove',dragMove);
  document.addEventListener('pointerup',dragEnd,{once:true});
}
function dragMove(e){
  if(!_drag)return;

  document.querySelectorAll('.day-items').forEach(c=>{
    const r=c.getBoundingClientRect();
    if(e.clientY>=r.top&&e.clientY<=r.bottom&&e.clientX>=r.left&&e.clientX<=r.right&&c!==_drag.container){
      _drag.container.classList.remove('drag-target');
      _drag.container=c;
      _drag.container.classList.add('drag-target');
    }
  });
  const after=getDragAfter(_drag.container,e.clientY);
  if(after==null) _drag.container.appendChild(_drag.el);
  else _drag.container.insertBefore(_drag.el,after);
}
function getDragAfter(container,y){ const els=[...container.querySelectorAll('.item:not(.dragging)')]; return els.reduce((closest,child)=>{ const box=child.getBoundingClientRect(); const offset=y-box.top-box.height/2; if(offset<0&&offset>closest.offset) return{offset,element:child}; return closest; },{offset:-Infinity}).element||null; }
function dragEnd(){
  if(!_drag)return;
  document.removeEventListener('pointermove',dragMove);
  document.body.style.userSelect=''; document.body.style.webkitUserSelect='';
  _drag.el.classList.remove('dragging'); _drag.container.classList.remove('drag-target');
  const newDayId=_drag.container.dataset.day;
  const origDayId=_drag.origDayId;
  const itId=_drag.itId;
  const newIds=[..._drag.container.querySelectorAll('.item')].map(el=>el.dataset.id);
  if(newDayId!==origDayId){
    // 跨天移動：從原天刪除，加到新天
    const oldItem=Object.assign({},(DATA.items&&DATA.items[ACTIVE]&&DATA.items[ACTIVE][origDayId]&&DATA.items[ACTIVE][origDayId][itId])||{});
    delete oldItem._id; oldItem.updatedBy=ME; oldItem.updatedAt=Date.now(); oldItem.order=newIds.indexOf(itId);
    fbRemove('items/'+ACTIVE+'/'+origDayId+'/'+itId);
    fbSet('items/'+ACTIVE+'/'+newDayId+'/'+itId,oldItem);
    const newUpd={}; newIds.forEach((id,i)=>{newUpd[id+'/order']=i;}); fbUpdate('items/'+ACTIVE+'/'+newDayId,newUpd);
    // 更新原天剩餘順序
    const oldDayData=DATA.items&&DATA.items[ACTIVE]&&DATA.items[ACTIVE][origDayId];
    if(oldDayData){ const rem=Object.keys(oldDayData).filter(k=>k!==itId).map(k=>Object.assign({_id:k},oldDayData[k])).sort((a,b)=>(a.order||0)-(b.order||0)); const oldUpd={}; rem.forEach((it,i)=>{oldUpd[it._id+'/order']=i;}); if(Object.keys(oldUpd).length) fbUpdate('items/'+ACTIVE+'/'+origDayId,oldUpd); }
  } else {
    const upd={}; newIds.forEach((id,i)=>{upd[id+'/order']=i;}); fbUpdate('items/'+ACTIVE+'/'+origDayId,upd);
  }
  _drag=null;
}

const OVP_CAT_LABELS={all:'全部',spot:'文化景點',natural:'自然',food:'餐廳',cafe:'咖啡廳',hotel:'住宿',religion:'廟宇/教堂'};
function _buildOvpQuery(lat,lon,cat){
  const r=cat==='natural'?20000:12000;
  const nw=(f)=>`node[name]${f}(around:${r},${lat},${lon});\nway[name]${f}(around:${r},${lat},${lon});`;
  const n=(f,rd=r)=>`node[name]${f}(around:${rd},${lat},${lon});`;
  const parts={
    all:[nw('["tourism"~"attraction|museum|viewpoint|artwork|monument|theme_park|zoo|gallery|ruins"]'),nw('["historic"~"monument|castle|ruins|archaeological_site|memorial"]'),n('["amenity"="place_of_worship"]')],
    spot:[nw('["tourism"~"attraction|museum|viewpoint|artwork|monument|theme_park|zoo|gallery|ruins"]'),nw('["historic"~"monument|castle|ruins|archaeological_site|memorial"]')],
    natural:[n('["natural"~"peak|waterfall|beach|hot_spring|cave_entrance"]',r),nw('["leisure"~"park|nature_reserve|garden"]',r)],
    food:[n('["amenity"~"restaurant|fast_food|food_court"]')],
    cafe:[n('["amenity"~"cafe|bar|pub"]')],
    hotel:[nw('["tourism"~"hotel|hostel|guest_house|motel"]')],
    religion:[nw('["amenity"="place_of_worship"]')],
  }[cat]||[];
  return `[out:json][timeout:30];\n(\n${parts.join('\n')}\n);\nout body center 60;`;
}
function _haversine(lat1,lon1,lat2,lon2){ const R=6371000,d2r=Math.PI/180; const dLat=(lat2-lat1)*d2r,dLon=(lon2-lon1)*d2r; const a=Math.sin(dLat/2)**2+Math.cos(lat1*d2r)*Math.cos(lat2*d2r)*Math.sin(dLon/2)**2; return Math.round(R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))); }
function _ovpToCat(tags){ if(!tags)return'spot'; const t=tags.tourism||'',a=tags.amenity||''; if(['hotel','hostel','guest_house','motel'].includes(t))return'hotel'; if(['restaurant','fast_food','food_court'].includes(a))return'food'; if(['cafe','bar','pub'].includes(a))return'food'; return'spot'; }

async function discoverPlaces(){
  const inp=$('disc-q'); _discQuery=(inp?inp.value:'').trim();
  if(!_discQuery){toast('請輸入城市名稱');return;}
  const box=$('disc-results'); if(box)box.innerHTML='<div style="color:var(--text-muted);font-size:12px;padding:8px 0">搜尋中，請稍候…</div>';
  try{
    const gj=await fetch('https://nominatim.openstreetmap.org/search?'+new URLSearchParams({q:_discQuery,format:'json',limit:'1','accept-language':'zh-TW,zh,en'})).then(r=>r.json());
    if(!gj||!gj.length){ const b=$('disc-results'); if(b)b.innerHTML='<div style="color:var(--danger);font-size:12px">找不到「'+esc(_discQuery)+'」，試試英文城市名</div>'; return; }
    const g=gj[0]; _discGeo={lat:parseFloat(g.lat),lon:parseFloat(g.lon),name:g.display_name.split(',')[0].trim()};
    const ov=await fetch('https://overpass-api.de/api/interpreter',{method:'POST',body:'data='+encodeURIComponent(_buildOvpQuery(_discGeo.lat,_discGeo.lon,_discCat))}).then(r=>r.json());
    const seen=new Set();
    _discResults=(ov.elements||[]).map(el=>{
      const tags=el.tags||{}; const name=tags['name:en']||tags['name:zh-TW']||tags['name:zh']||tags.name;
      if(!name||seen.has(name))return null; seen.add(name);
      const lat=el.lat??(el.center?.lat), lon=el.lon??(el.center?.lon);
      if(lat==null||lon==null)return null;
      return{name,lat,lon,tags,dist:_haversine(_discGeo.lat,_discGeo.lon,lat,lon),priority:tags.wikidata?2:tags.wikipedia?1:0};
    }).filter(Boolean).sort((a,b)=>(b.priority-a.priority)||(a.dist-b.dist)).slice(0,25);
    const b=$('disc-results'); if(b)b.innerHTML=_discResultsHtml();
  }catch(e){ const b=$('disc-results'); if(b)b.innerHTML=`<div style="color:var(--danger);font-size:12px">搜尋失敗，請稍後再試</div>`; }
}
function discoverByKind(cat){ _discCat=cat; _discResults=[]; scheduleRender(); if(_discGeo||_discQuery)setTimeout(discoverPlaces,50); }

/* ── 備份/還原 ── */
function snapshotTrip(){
  if(!ACTIVE){toast('請先選一趟旅程');return;}
  const tripName=(DATA.trips&&DATA.trips[ACTIVE]?.name)||ACTIVE;
  const date=new Date().toISOString().replace('T','_').slice(0,16);
  const snap={_snapshotMeta:{tripId:ACTIVE,tripName,at:Date.now()}};
  ['trips','days','items','places','memos','todos','polls','flights','roles'].forEach(k=>{
    if(DATA[k]&&DATA[k][ACTIVE]) snap[k]={[ACTIVE]:JSON.parse(JSON.stringify(DATA[k][ACTIVE]))};
  });
  if(DATA.trips&&DATA.trips[ACTIVE]) snap.trips={[ACTIVE]:DATA.trips[ACTIVE]};
  const filename=('snapshot_'+tripName+'_'+date+'.json').replace(/[^\w.\-一-鿿]/g,'_');
  const blob=new Blob([JSON.stringify(snap,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=filename;document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);
  toast('快照已下載：'+filename);
}
function restoreSnapshot(event){
  const file=event.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const snap=JSON.parse(e.target.result);
      if(typeof snap!=='object'||Array.isArray(snap))throw new Error();
      const meta=snap._snapshotMeta||{};
      const label=meta.tripName?`「${meta.tripName}」`:'此旅程';
      const atStr=meta.at?new Date(meta.at).toLocaleString('zh-TW',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}):'';
      appConfirm(`確認還原${label}快照？${atStr?'\n時間：'+atStr:''}\n目前資料將被覆蓋，建議先備份。`,()=>{
        ['trips','days','items','places','memos','todos','polls','flights'].forEach(k=>{
          if(snap[k]){
            if(!DATA[k])DATA[k]={};
            Object.assign(DATA[k],snap[k]);
            if(db) Object.keys(snap[k]).forEach(tid=>ref(k+'/'+tid).set(snap[k][tid]).catch(()=>{}));
          }
        });
        saveData();renderAll();toast('快照還原成功！');
      });
    }catch(err){toast('檔案格式錯誤，請選擇正確的快照檔');}
    event.target.value='';
  };
  reader.readAsText(file);
}
function exportData(){
  const date=new Date().toISOString().slice(0,10);
  const name=(DATA.trips&&Object.keys(DATA.trips||{}).length===1&&Object.values(DATA.trips)[0]&&Object.values(DATA.trips)[0].name)?Object.values(DATA.trips)[0].name:'all';
  const filename=('travel_backup_'+name+'_'+date+'.json').replace(/[^\w.\-一-鿿]/g,'_');
  const blob=new Blob([JSON.stringify(DATA,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=filename; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
  toast('備份已下載：'+filename);
}
function importData(event){
  const file=event.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const imported=JSON.parse(e.target.result);
      if(typeof imported!=='object'||Array.isArray(imported)) throw new Error('格式錯誤');
      appConfirm('確認覆蓋目前所有資料？\n此操作無法復原，建議先匯出備份。',()=>{
        DATA=imported;
        saveData();
        if(db) ref().set(DATA).catch(()=>{});
        ACTIVE=localStorage.getItem('tv_trip')||Object.keys(DATA.trips||{})[0]||'';
        localStorage.setItem('tv_trip',ACTIVE);
        toast('還原成功！'); renderAll();
      });
    }catch(err){ toast('檔案格式錯誤，請選擇正確的備份檔'); }
    event.target.value='';
  };
  reader.readAsText(file);
}

/* ── 天氣 ── */
const WXCODE={0:['☀️','晴'],1:['🌤️','大致晴'],2:['⛅','多雲'],3:['☁️','陰'],45:['🌫️','霧'],48:['🌫️','霧'],51:['🌦️','毛毛雨'],53:['🌦️','小雨'],55:['🌧️','雨'],61:['🌧️','小雨'],63:['🌧️','雨'],65:['🌧️','大雨'],71:['🌨️','小雪'],73:['🌨️','雪'],75:['❄️','大雪'],80:['🌦️','陣雨'],81:['🌧️','陣雨'],82:['⛈️','強陣雨'],95:['⛈️','雷雨'],96:['⛈️','雷雨'],99:['⛈️','雷雨']};
async function getWeather(){
  const q=$('wx-q').value.trim(); if(!q){toast('請輸入城市');return;}
  const box=$('wx-result'); box.textContent='查詢中…';
  try{
    const g=await fetch('https://geocoding-api.open-meteo.com/v1/search?name='+encodeURIComponent(q)+'&count=1&language=zh').then(r=>r.json());
    if(!g.results||!g.results.length){ box.textContent='找不到這個城市'; return; }
    const{latitude,longitude,name,country}=g.results[0];
    const w=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=auto&forecast_days=14`).then(r=>r.json());
    const d=w.daily; let html=`<div style="font-weight:700;color:var(--text-primary);margin-bottom:6px">${esc(name)}${country?'・'+esc(country):''}</div><div class="wx-scroll">`;
    for(let i=0;i<d.time.length;i++){const c=WXCODE[d.weathercode[i]]||['❓',''];const dt=new Date(d.time[i]+'T00:00');
      html+=`<div class="wx-day"><div style="font-size:11px;font-weight:700;color:var(--text-muted)">${(d.time[i]).slice(5)}</div><div style="font-size:10px;color:var(--text-muted)">週${['日','一','二','三','四','五','六'][dt.getDay()]}</div><div class="wx-emoji">${c[0]}</div><div style="font-size:10px;color:var(--text-muted)">${c[1]}</div><div style="font-size:12px;font-weight:700;margin-top:3px">${Math.round(d.temperature_2m_max[i])}°<span style="color:var(--text-muted)">/${Math.round(d.temperature_2m_min[i])}°</span></div></div>`;}
    html+=`</div>`; box.innerHTML=html;
  }catch(e){ box.textContent='查詢失敗，請檢查網路'; }
}

/* ── 匯率（open.er-api.com） ── */
let _fxRates=null,_fxBase=null;
async function doFx(){
  const amt=parseFloat($('fx-amt')?.value)||0; const from=($('fx-from')?.value||'').trim().toUpperCase(); const to=($('fx-to')?.value||'').trim().toUpperCase();
  const res=$('fx-result'); if(!res)return; if(!from||!to){res.textContent='—';return;}
  try{
    if(_fxBase!==from||!_fxRates){ const j=await fetch('https://open.er-api.com/v6/latest/'+from).then(r=>r.json()); if(j.result!=='success'){res.textContent='查無此幣別';return;} _fxRates=j.rates;_fxBase=from; }
    const rate=_fxRates[to]; if(!rate){res.textContent='查無此幣別';return;}
    res.textContent=`${amt.toLocaleString()} ${from} ≈ ${(amt*rate).toLocaleString(undefined,{maximumFractionDigits:2})} ${to}`;
  }catch(e){ res.textContent='匯率查詢失敗'; }
}

/* ════════════ Google Maps 路線 ════════════ */
function extractCoordsFromUrl(url){
  if(!url) return null;
  const m1=url.match(/@(-?\d+\.?\d+),(-?\d+\.?\d+)/);
  if(m1) return {lat:parseFloat(m1[1]),lng:parseFloat(m1[2])};
  const m2=url.match(/[?&]q=(-?\d+\.?\d+),(-?\d+\.?\d+)/);
  if(m2) return {lat:parseFloat(m2[1]),lng:parseFloat(m2[2])};
  const m3=url.match(/maps\/place\/[^/]+\/@(-?\d+\.?\d+),(-?\d+\.?\d+)/);
  if(m3) return {lat:parseFloat(m3[1]),lng:parseFloat(m3[2])};
  return null;
}
function openDayRoute(dayId){
  const items=sortedBy(DATA.items&&DATA.items[ACTIVE]&&DATA.items[ACTIVE][dayId],'order').filter(it=>it.name);
  if(items.length<2){toast('至少需要 2 個景點才能建立路線');return;}
  const dest=(DATA.trips&&DATA.trips[ACTIVE]&&DATA.trips[ACTIVE].dest)||'';
  const getPoint=(item)=>{
    const c=extractCoordsFromUrl(item.mapUrl||'');
    if(c) return c.lat+','+c.lng;
    return encodeURIComponent((item.name||'')+(dest?' '+dest:''));
  };
  const pts=items.map(getPoint);
  const origin=pts[0],destination=pts[pts.length-1];
  const mid=pts.slice(1,-1).slice(0,7);
  let url='https://www.google.com/maps/dir/?api=1&origin='+origin+'&destination='+destination+'&travelmode=transit';
  if(mid.length) url+='&waypoints='+mid.join('|');
  window.open(url,'_blank');
}
