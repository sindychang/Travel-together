/* ── Excel / CSV 匯入（沿用原分帳格式） ── */
function sbHandleFile(f){
  if(!f) return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'binary',cellDates:true});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const raw=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      sbParseRows(raw);
    }catch(err){ toast('解析失敗：'+err.message); }
  };
  r.readAsBinaryString(f);
}
function sbIsDup(r){
  const rAmt=Math.round(r.amount); const rName=(r.name||'').trim();
  return sbExpensesArr().some(e=>e.type!=='settlement'&&(e.name||'').trim()===rName&&e.date===r.date&&Math.abs(Math.round(e.amount)-rAmt)<=1);
}
function sbParseRows(raw){
  if(!raw.length){toast('未找到資料');return;}
  const header=raw[0].map(h=>String(h||'').trim());
  const hasNewFmt=header.some(h=>h.match(/[\(（]欠款[\)）]/));
  if(hasNewFmt) sbParseNewFmt(raw,header); else sbParseOldFmt(raw);
}
function sbParseDateStr(raw){
  if(raw instanceof Date){ const y=raw.getFullYear(),m=String(raw.getMonth()+1).padStart(2,'0'),d=String(raw.getDate()).padStart(2,'0'); return y+'-'+m+'-'+d; }
  const s=String(raw).trim();
  const m=s.match(/(\d{4})[\/\-年](\d{1,2})[\/\-月](\d{1,2})/);
  if(m) return m[1]+'-'+String(m[2]).padStart(2,'0')+'-'+String(m[3]).padStart(2,'0');
  const d=new Date(s.replace(/\//g,'-')); if(!isNaN(d.getTime())) return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  return s;
}
function sbParseNewFmt(raw,header){
  function findCol(names){ return header.findIndex(h=>names.some(n=>h===n||h.includes(n))); }
  const nameCol=findCol(['名稱','品項']), catCol=findCol(['類別']), dateCol=findCol(['日期']), amtCol=findCol(['金額']), rateCol=findCol(['匯率']);
  const oweMap={},paidMap={};
  header.forEach((h,i)=>{ const ow=h.match(/^(.+?)[\s　]*[\(（]欠款[\)）]$/); const pd=h.match(/^(.+?)[\s　]*[\(（]信出[\)）]$/); if(ow) oweMap[ow[1].trim()]=i; if(pd) paidMap[pd[1].trim()]=i; });
  const members=Object.keys(oweMap);
  if(!members.length){toast('找不到成員欄位（欠款）');return;}
  sbPendingRows=[];
  raw.slice(1).forEach(row=>{
    const nameV=nameCol>=0?String(row[nameCol]||'').trim():''; if(!nameV) return;
    const catV=catCol>=0?String(row[catCol]||'').trim():'';
    const dateRaw=dateCol>=0?row[dateCol]:'';
    const amtRaw=amtCol>=0?row[amtCol]:0;
    const rate=rateCol>=0?(parseFloat(row[rateCol])||1):1;
    const date=sbParseDateStr(dateRaw);
    const amount=(parseFloat(amtRaw)||0)*rate;
    let payer='',maxPaid=0;
    Object.entries(paidMap).forEach(([m,ci])=>{ const v=(parseFloat(row[ci])||0)*rate; if(v>maxPaid){maxPaid=v;payer=m;} });
    if(!payer&&members.length) payer=members[0];
    const splitDetails=[]; members.forEach(m=>{ const v=(parseFloat(row[oweMap[m]])||0)*rate; if(v>0) splitDetails.push({name:m,amount:v}); });
    const cat=sbMapCat(catV);
    const errs=[]; if(!nameV)errs.push('名稱'); if(!date)errs.push('日期'); if(!amount||amount<=0)errs.push('金額'); if(!payer)errs.push('付款人'); if(!splitDetails.length)errs.push('分攤');
    const paidDetails=[]; Object.entries(paidMap).forEach(([m,ci])=>{ const v=(parseFloat(row[ci])||0)*rate; if(v>0) paidDetails.push({name:m,amount:v}); });
    const rowObj={name:nameV,cat,date,amount,payer,splitDetails,paidDetails,splitAmong:splitDetails.map(d=>d.name),errs};
    rowObj.dup=(!rowObj.errs.length&&sbIsDup(rowObj));
    sbPendingRows.push(rowObj);
  });
  if(!sbPendingRows.length){toast('未找到有效資料列');return;}
  sbShowPreview('new',members);
}
function sbParseOldFmt(raw){
  const start=String(raw[0]?.[0]||'').match(/日期|date/i)?1:0;
  sbPendingRows=[];
  raw.slice(start).forEach(row=>{
    if(!row[0]&&!row[1]&&!row[2]) return;
    const date=sbParseDateStr(row[0]);
    const name=String(row[1]||'').trim(), amount=parseFloat(row[2]), payer=String(row[3]||'').trim();
    const splitRaw=row[4]?String(row[4]).split(/[,，、]/).map(s=>s.trim()).filter(Boolean):[];
    const errs=[]; if(!date)errs.push('日期'); if(!name)errs.push('品項'); if(isNaN(amount)||amount<=0)errs.push('金額'); if(!payer)errs.push('付款人');
    const splitAmong=splitRaw.length?splitRaw:null;
    const splitDetails=splitAmong?splitAmong.map(m=>({name:m,amount:amount/splitAmong.length})):null;
    const rowObj={name,cat:'other',date,amount,payer,splitAmong:splitAmong||[],splitDetails:splitDetails||[],errs};
    rowObj.dup=(!rowObj.errs.length&&sbIsDup(rowObj));
    sbPendingRows.push(rowObj);
  });
  if(!sbPendingRows.length){toast('未找到有效資料列');return;}
  sbShowPreview('old',[]);
}
function sbShowPreview(fmt,members){
  const box=$('sb-import-preview'); if(!box) return;
  const dupCnt=sbPendingRows.filter(r=>r.dup).length, errCnt=sbPendingRows.filter(r=>r.errs.length).length;
  let h=`<div style="font-size:12px;color:var(--text-muted);margin-bottom:8px">${sbPendingRows.length} 筆（可匯入 ${sbPendingRows.length-dupCnt-errCnt}，重複 ${dupCnt}，錯誤 ${errCnt}）</div>`;
  h+=`<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:11px;min-width:400px">`;
  if(fmt==='new'){
    h+=`<tr>${['名稱','類別','日期','金額','付款人','狀態'].map(t=>`<th style="background:var(--bg);padding:6px 8px;text-align:left;border:1px solid var(--border-light)">${t}</th>`).join('')}</tr>`;
    h+=sbPendingRows.map(r=>{ const c=SBCAT[r.cat]||SBCAT.other; const status=r.dup?'<span style="color:#94a3b8">重複</span>':!r.errs.length?'<span style="color:var(--success)">✓</span>':'<span style="color:var(--danger)">'+r.errs.join(',')+'</span>';
      return `<tr style="${r.dup?'opacity:.5':''}"><td style="padding:5px 8px;border:1px solid var(--border-light)">${esc(r.name)}</td><td style="padding:5px 8px;border:1px solid var(--border-light)">${c.lbl}</td><td style="padding:5px 8px;border:1px solid var(--border-light)">${esc(r.date)}</td><td style="padding:5px 8px;border:1px solid var(--border-light)">${r.amount.toFixed(0)}</td><td style="padding:5px 8px;border:1px solid var(--border-light)">${esc(r.payer)}</td><td style="padding:5px 8px;border:1px solid var(--border-light)">${status}</td></tr>`;
    }).join('');
  } else {
    h+=`<tr>${['日期','品項','金額','付款人','分攤','狀態'].map(t=>`<th style="background:var(--bg);padding:6px 8px;text-align:left;border:1px solid var(--border-light)">${t}</th>`).join('')}</tr>`;
    h+=sbPendingRows.map(r=>{ const status=r.dup?'<span style="color:#94a3b8">重複</span>':!r.errs.length?'<span style="color:var(--success)">✓</span>':'<span style="color:var(--danger)">'+r.errs.join(',')+'</span>';
      return `<tr style="${r.dup?'opacity:.5':''}"><td style="padding:5px 8px;border:1px solid var(--border-light)">${esc(r.date)}</td><td style="padding:5px 8px;border:1px solid var(--border-light)">${esc(r.name)}</td><td style="padding:5px 8px;border:1px solid var(--border-light)">${isNaN(r.amount)?'-':r.amount}</td><td style="padding:5px 8px;border:1px solid var(--border-light)">${esc(r.payer)}</td><td style="padding:5px 8px;border:1px solid var(--border-light)">${esc(r.splitAmong.join(','))||'全員'}</td><td style="padding:5px 8px;border:1px solid var(--border-light)">${status}</td></tr>`;
    }).join('');
  }
  h+=`</table></div>
  <div style="display:flex;gap:10px;margin-top:12px"><button class="btn" onclick="sbConfirmImport()">確認匯入</button><button class="btn gray" onclick="sbCancelImport()">取消</button></div>`;
  box.innerHTML=h;
}
function sbConfirmImport(){
  const dups=sbPendingRows.filter(r=>r.dup).length; const valid=sbPendingRows.filter(r=>!r.errs.length&&!r.dup);
  if(!valid.length){toast('沒有可匯入的有效資料');return;}
  const existingRoles=tripRoles(ACTIVE); const existingNames=new Set(Object.values(existingRoles).map(r=>r.name));
  const roleAdds={};
  valid.forEach(r=>{
    [r.payer,...r.splitAmong].forEach(n=>{
      if(n&&!existingNames.has(n)&&!Object.values(roleAdds).some(v=>v.name===n)){
        roleAdds['roles/'+uid()]={name:n,emoji:PERSON_EMOJIS[Math.floor(Math.random()*PERSON_EMOJIS.length)]};
      }
    });
  });
  if(Object.keys(roleAdds).length) fbUpdate('trips/'+ACTIVE,roleAdds);
  const expAdds={};
  valid.forEach(r=>{
    const sa=r.splitAmong.length?r.splitAmong:sbMembers();
    const sd=r.splitDetails.length?r.splitDetails:sa.map(n=>({name:n,amount:r.amount/sa.length}));
    const id=uid();
    expAdds[id]={name:r.name,amount:r.amount,currency:sbCurrency(),date:r.date,payer:r.payer,cat:r.cat||'other',splitMode:r.splitDetails.length?'amount':'equal',splitAmong:sa,splitDetails:sd,paidDetails:(r.paidDetails&&r.paidDetails.length?r.paidDetails:null),createdAt:Date.now(),updatedBy:ME,updatedAt:Date.now()};
  });
  fbUpdate('trips/'+ACTIVE+'/splitbill/expenses',expAdds);
  sbCancelImport();
  const skipped=sbPendingRows.length-valid.length;
  toast('匯入 '+valid.length+' 筆'+(dups?'（略過 '+dups+' 筆重複）':'')+((skipped-dups)?'（錯誤 '+(skipped-dups)+' 筆）':''));
  renderSplitbill();
}
function sbCancelImport(){ sbPendingRows=[]; const box=$('sb-import-preview'); if(box) box.innerHTML=''; const inp=$('sb-import-input'); if(inp) inp.value=''; }
function sbDlTemplate(){
  const members=sbMembers().length?sbMembers():['成員A','成員B'];
  const n=members.length;
  const header=['名稱','類別','日期','幣別','匯率','金額',...members.map(m=>m+' (欠款)'),...members.map(m=>m+' (信出)')];
  const row1=['晚餐','吃喝','2024/6/1','TWD',1,1200,...members.map(()=>parseFloat((1200/n).toFixed(1))),...members.map((_,i)=>i===0?1200:0)];
  const row2=['計程車','交通','2024/6/2','TWD',1,350,...members.map(()=>parseFloat((350/n).toFixed(1))),...members.map((_,i)=>i===1?350:0)];
  const ws=XLSX.utils.aoa_to_sheet([header,row1,row2]);
  ws['!cols']=[{wch:14},{wch:8},{wch:12},{wch:6},{wch:6},{wch:8},...members.map(()=>({wch:10})),...members.map(()=>({wch:10}))];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'分帳資料');
  XLSX.writeFile(wb,'分帳匯入範本.xlsx');
}
